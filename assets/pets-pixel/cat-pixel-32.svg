  <rect x="6" y="4" width="1" height="1" fill="#9DA3AF"/>
  <rect x="7" y="4" width="1" height="1" fill="#9DA3AF"/>
  <rect x="5" y="5" width="1" height="1" fill="#9DA3AF"/>
  <rect x="6" y="5" width="1" height="1" fill="#FFB8C8"/>
  <rect x="7" y="5" width="1" height="1" fill="#9DA3AF"/>
  <rect x="6" y="6" width="1" height="1" fill="#9DA3AF"/>
  <rect x="7" y="6" width="1" height="1" fill="#9DA3AF"/>
  
  <!-- 右耳 -->
  <rect x="25" y="3" width="1" height="1" fill="#9DA3AF"/>
  <rect x="24" y="4" width="1" height="1" fill="#9DA3AF"/>
  <rect x="25" y="4" width="1" height="1" fill="#9DA3AF"/>
  <rect x="26" y="4" width="1" height="1" fill="#9DA3AF"/>
  <rect x="24" y="5" width="1" height="1" fill="#9DA3AF"/>
  <rect x="25" y="5" width="1" height="1" fill="#FFB8C8"/>
  <rect x="26" y="5" width="1" height="1" fill="#9DA3AF"/>
  <rect x="24" y="6" width="1" height="1" fill="#9DA3AF"/>
  <rect x="25" y="6" width="1" height="1" fill="#9DA3AF"/>
  
  <!-- 头部主体 -->
  <rect x="8" y="5" width="16" height="1" fill="#9DA3AF"/>
  <rect x="7" y="6" width="18" height="1" fill="#9DA3AF"/>
  <rect x="6" y="7" width="20" height="1" fill="#9DA3AF"/>
  <rect x="6" y="8" width="20" height="1" fill="#9DA3AF"/>
  <rect x="6" y="9" width="20" height="1" fill="#9DA3AF"/>
  <rect x="6" y="10" width="20" height="1" fill="#9DA3AF"/>
  <rect x="6" y="11" width="20" height="1" fill="#9DA3AF"/>
  <rect x="6" y="12" width="20" height="1" fill="#9DA3AF"/>
  <rect x="6" y="13" width="20" height="1" fill="#9DA3AF"/>
  <rect x="7" y="14" width="18" height="1" fill="#9DA3AF"/>
  <rect x="8" y="15" width="16" height="1" fill="#9DA3AF"/>
