  <rect x="9" y="6" width="4" height="1" fill="#C8D0E0"/>
  <rect x="8" y="7" width="5" height="1" fill="#C8D0E0"/>
  <rect x="8" y="8" width="4" height="1" fill="#C8D0E0"/>
  
  <!-- 左眼 -->
  <rect x="9" y="9" width="4" height="1" fill="#FFFFFF"/>
  <rect x="8" y="10" width="6" height="1" fill="#FFFFFF"/>
  <rect x="8" y="11" width="6" height="1" fill="#FFFFFF"/>
  <rect x="9" y="12" width="4" height="1" fill="#FFFFFF"/>
  <!-- 左眼瞳孔 -->
  <rect x="10" y="10" width="2" height="1" fill="#4A7AB8"/>
