  <rect x="17" y="14" width="1" height="1" fill="#6A6A7A"/>
  
  <!-- 左腮红 -->
  <rect x="7" y="12" width="2" height="1" fill="#FFB0C0"/>
  
  <!-- 右腮红 -->
  <rect x="23" y="12" width="2" height="1" fill="#FFB0C0"/>
  
  <!-- 左胡须 -->
  <rect x="3" y="11" width="4" height="1" fill="#C8D0E0"/>
  <rect x="4" y="13" width="3" height="1" fill="#C8D0E0"/>
  
  <!-- 右胡须 -->
  <rect x="25" y="11" width="4" height="1" fill="#C8D0E0"/>
  <rect x="25" y="13" width="3" height="1" fill="#C8D0E0"/>
  
  <!-- 身体 -->
  <rect x="10" y="17" width="12" height="1" fill="#9DA3AF"/>
  <rect x="9" y="18" width="14" height="1" fill="#9DA3AF"/>
  <rect x="9" y="19" width="14" height="1" fill="#9DA3AF"/>
  <rect x="9" y="20" width="14" height="1" fill="#9DA3AF"/>
  <rect x="9" y="21" width="14" height="1" fill="#9DA3AF"/>
  <rect x="10" y="22" width="12" height="1" fill="#9DA3AF"/>
  
