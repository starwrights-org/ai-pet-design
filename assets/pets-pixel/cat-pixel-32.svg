  <rect x="10" y="18" width="3" height="1" fill="#C8D0E0"/>
  <rect x="10" y="19" width="2" height="1" fill="#C8D0E0"/>
  
  <!-- 左前腿 -->
  <rect x="10" y="23" width="3" height="1" fill="#8A909B"/>
  <rect x="10" y="24" width="3" height="1" fill="#8A909B"/>
  <rect x="10" y="25" width="3" height="1" fill="#FFB8C8"/>
  
  <!-- 右前腿 -->
  <rect x="19" y="23" width="3" height="1" fill="#8A909B"/>
  <rect x="19" y="24" width="3" height="1" fill="#8A909B"/>
  <rect x="19" y="25" width="3" height="1" fill="#FFB8C8"/>
  
  <!-- 尾巴 -->
  <rect x="23" y="19" width="2" height="1" fill="#8A909B"/>
  <rect x="24" y="18" width="2" height="1" fill="#8A909B"/>
  <rect x="25" y="17" width="2" height="1" fill="#9DA3AF"/>
  <rect x="26" y="16" width="2" height="1" fill="#9DA3AF"/>
  
  <!-- 阴影 -->
  <rect x="9" y="26" width="14" height="1" fill="#4A4A60" fill-opacity="0.3"/>
  <rect x="10" y="27" width="12" height="1" fill="#4A4A60" fill-opacity="0.2"/>
</svg>