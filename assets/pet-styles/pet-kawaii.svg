<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256">
  <!-- Pastel Kawaii 风格 AI Pet -->
  <!-- 参考: Hello Kitty、角落生物 -->
  <!-- 特点: 大眼睛、圆润、粉彩色、温暖治愈 -->
  
  <defs>
    <!-- 柔和渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0F5"/>
      <stop offset="100%" style="stop-color:#E8F4F8"/>
    </linearGradient>
    <!-- 身体渐变 -->
    <radialGradient id="bodyGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#FFF0F5"/>
    </radialGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" opacity="0.5"/>
  
  <!-- 身体 - 极度圆润 -->
  <ellipse cx="32" cy="38" rx="26" ry="24" fill="url(#bodyGrad)"/>
  <ellipse cx="32" cy="38" rx="26" ry="24" fill="none" stroke="#E8D0E0" stroke-width="1"/>
  
  <!-- 耳朵 - 圆圆的小耳朵 -->
  <circle cx="14" cy="20" r="8" fill="#FFF0F5"/>
  <circle cx="14" cy="20" r="8" fill="none" stroke="#E8D0E0" stroke-width="1"/>
  <circle cx="14" cy="20" r="5" fill="#FFD4E5"/>
  
  <circle cx="50" cy="20" r="8" fill="#FFF0F5"/>
  <circle cx="50" cy="20" r="8" fill="none" stroke="#E8D0E0" stroke-width="1"/>
  <circle cx="50" cy="20" r="5" fill="#FFD4E5"/>
  
  <!-- 眼睛 - 超大闪亮眼睛 -->
  <!-- 左眼 -->
  <ellipse cx="22" cy="34" rx="7" ry="8" fill="#2A2A2A"/>
  <circle cx="24" cy="32" r="3" fill="#FFFFFF"/>
  <circle cx="20" cy="36" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- 右眼 -->
  <ellipse cx="42" cy="34" rx="7" ry="8" fill="#2A2A2A"/>
  <circle cx="44" cy="32" r="3" fill="#FFFFFF"/>
  <circle cx="40" cy="36" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- 腮红 - 大大的粉色腮红 -->
  <ellipse cx="10" cy="42" rx="6" ry="4" fill="#FFB8D0" opacity="0.6"/>
  <ellipse cx="54" cy="42" rx="6" ry="4" fill="#FFB8D0" opacity="0.6"/>
  
  <!-- 小鼻子 -->
  <ellipse cx="32" cy="42" rx="2" ry="1.5" fill="#FFB0C0"/>
  
  <!-- 嘴巴 - 可爱猫嘴 -->
  <path d="M 28 46 Q 32 44 32 46 Q 32 44 36 46" fill="none" stroke="#E8A0B0" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 小脚 - 圆圆的 -->
  <ellipse cx="22" cy="58" rx="6" ry="4" fill="#FFF0F5"/>
  <ellipse cx="22" cy="58" rx="6" ry="4" fill="none" stroke="#E8D0E0" stroke-width="1"/>
  <ellipse cx="42" cy="58" rx="6" ry="4" fill="#FFF0F5"/>
  <ellipse cx="42" cy="58" rx="6" ry="4" fill="none" stroke="#E8D0E0" stroke-width="1"/>
  
  <!-- 装饰 - 小蝴蝶结 -->
  <g transform="translate(50, 14)">
    <ellipse cx="-4" cy="0" rx="4" ry="3" fill="#FFD0E8"/>
    <ellipse cx="4" cy="0" rx="4" ry="3" fill="#FFD0E8"/>
    <circle cx="0" cy="0" r="2" fill="#FFB0D0"/>
  </g>
  
  <!-- 小星星装饰 -->
  <polygon points="8,10 9,13 12,13 10,15 11,18 8,16 5,18 6,15 4,13 7,13" fill="#FFE4B5" opacity="0.7"/>
</svg>