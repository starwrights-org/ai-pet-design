<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Bird Idle Frame 2 - 微弹+头歪 -->
  
  <!-- 头顶羽毛（向右歪） -->
  <rect x="16" y="2" width="2" height="1" fill="#FFD040"/>
  <rect x="15" y="3" width="4" height="1" fill="#FFE060"/>
  
  <!-- 头部（向右歪） -->
  <rect x="13" y="4" width="8" height="1" fill="#FFD040"/>
  <rect x="12" y="5" width="10" height="1" fill="#FFE060"/>
  <rect x="16" y="5" width="2" height="1" fill="#FFFFFF"/>
  <rect x="11" y="6" width="12" height="1" fill="#FFE060"/>
  <rect x="15" y="6" width="4" height="1" fill="#FFFFFF"/>
  
  <!-- 眼睛 -->
  <rect x="11" y="7" width="12" height="1" fill="#FFE060"/>
  <rect x="14" y="7" width="1" height="1" fill="#2A2A2A"/>
  <rect x="19" y="7" width="1" height="1" fill="#2A2A2A"/>
  
  <!-- 眼睛下+腮红 -->
  <rect x="11" y="8" width="12" height="1" fill="#FFE060"/>
  <rect x="14" y="8" width="1" height="1" fill="#2A2A2A"/>
  <rect x="19" y="8" width="1" height="1" fill="#2A2A2A"/>
  <rect x="12" y="8" width="1" height="1" fill="#FFB0C0"/>
  <rect x="21" y="8" width="1" height="1" fill="#FFB0C0"/>
  
  <!-- 嘴喙 -->
  <rect x="12" y="9" width="10" height="1" fill="#FFE060"/>
  <rect x="15" y="9" width="4" height="1" fill="#FF8030"/>
  <rect x="13" y="10" width="8" height="1" fill="#FFE060"/>
  <rect x="16" y="10" width="2" height="1" fill="#E06020"/>
  
  <!-- 身体 -->
  <rect x="12" y="11" width="8" height="1" fill="#FFE060"/>
  <rect x="14" y="11" width="4" height="1" fill="#FFFFFF"/>
  <rect x="12" y="12" width="8" height="1" fill="#FFE060"/>
  <rect x="15" y="12" width="2" height="1" fill="#FFFFFF"/>
  <rect x="13" y="13" width="6" height="1" fill="#FFE060"/>
  <rect x="14" y="14" width="4" height="1" fill="#FFD040"/>
  
  <!-- 翅膀 -->
  <rect x="8" y="11" width="3" height="1" fill="#FFD040"/>
  <rect x="7" y="12" width="4" height="1" fill="#FFE060"/>
  <rect x="6" y="13" width="3" height="1" fill="#FFD040"/>
  <rect x="21" y="11" width="3" height="1" fill="#FFD040"/>
  <rect x="21" y="12" width="4" height="1" fill="#FFE060"/>
  <rect x="23" y="13" width="3" height="1" fill="#FFD040"/>
  
  <!-- 尾羽 -->
  <rect x="14" y="15" width="4" height="1" fill="#E0B030"/>
  <rect x="13" y="16" width="6" height="1" fill="#FFD040"/>
  
  <!-- 脚 -->
  <rect x="14" y="17" width="2" height="1" fill="#FF8030"/>
  <rect x="16" y="17" width="2" height="1" fill="#FF8030"/>
  <rect x="14" y="18" width="2" height="1" fill="#E06020"/>
  <rect x="16" y="18" width="2" height="1" fill="#E06020"/>
</svg>
