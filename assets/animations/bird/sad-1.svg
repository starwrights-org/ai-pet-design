<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Bird Sad Frame 1 - 难过低头 -->
  
  <!-- 头顶羽毛（耷拉） -->
  <rect x="14" y="5" width="1" height="1" fill="#FFD040"/>
  <rect x="13" y="6" width="2" height="1" fill="#FFE060"/>
  
  <!-- 头部（低下） -->
  <rect x="11" y="7" width="8" height="1" fill="#FFD040"/>
  <rect x="10" y="8" width="10" height="1" fill="#FFE060"/>
  <rect x="14" y="8" width="2" height="1" fill="#FFFFFF"/>
  <rect x="9" y="9" width="12" height="1" fill="#FFE060"/>
  <rect x="13" y="9" width="4" height="1" fill="#FFFFFF"/>
  
  <!-- 眼睛（悲伤） -->
  <rect x="9" y="10" width="12" height="1" fill="#FFE060"/>
  <rect x="12" y="10" width="1" height="1" fill="#2A2A2A"/>
  <rect x="17" y="10" width="1" height="1" fill="#2A2A2A"/>
  <rect x="11" y="11" width="1" height="1" fill="#2A2A2A"/>
  <rect x="18" y="11" width="1" height="1" fill="#2A2A2A"/>
  
  <!-- 眼泪 -->
  <rect x="10" y="11" width="1" height="1" fill="#87CEEB"/>
  <rect x="19" y="11" width="1" height="1" fill="#87CEEB"/>
  
  <!-- 腮红 -->
  <rect x="9" y="11" width="12" height="1" fill="#FFE060"/>
  
  <!-- 嘴喙（闭上） -->
  <rect x="10" y="12" width="10" height="1" fill="#FFE060"/>
  <rect x="13" y="12" width="4" height="1" fill="#FF8030"/>
  <rect x="11" y="13" width="8" height="1" fill="#FFE060"/>
  <rect x="14" y="13" width="2" height="1" fill="#E06020"/>
  
  <!-- 身体 -->
  <rect x="11" y="14" width="8" height="1" fill="#FFE060"/>
  <rect x="13" y="14" width="4" height="1" fill="#FFFFFF"/>
  <rect x="11" y="15" width="8" height="1" fill="#FFE060"/>
  <rect x="14" y="15" width="2" height="1" fill="#FFFFFF"/>
  <rect x="12" y="16" width="6" height="1" fill="#FFE060"/>
  <rect x="13" y="17" width="4" height="1" fill="#FFD040"/>
  
  <!-- 翅膀（下垂） -->
  <rect x="7" y="14" width="3" height="1" fill="#FFD040"/>
  <rect x="6" y="15" width="4" height="1" fill="#FFE060"/>
  <rect x="5" y="16" width="3" height="1" fill="#FFD040"/>
  <rect x="20" y="14" width="3" height="1" fill="#FFD040"/>
  <rect x="20" y="15" width="4" height="1" fill="#FFE060"/>
  <rect x="22" y="16" width="3" height="1" fill="#FFD040"/>
  
  <!-- 尾羽（下垂） -->
  <rect x="13" y="18" width="4" height="1" fill="#E0B030"/>
  <rect x="12" y="19" width="6" height="1" fill="#FFD040"/>
  
  <!-- 脚 -->
  <rect x="14" y="20" width="2" height="1" fill="#FF8030"/>
  <rect x="16" y="20" width="2" height="1" fill="#FF8030"/>
</svg>
