  <!-- 右翅膀（下） -->
  <rect x="21" y="12" width="3" height="1" fill="#FFD040"/>
  <rect x="21" y="13" width="4" height="1" fill="#FFE060"/>
  <rect x="23" y="14" width="3" height="1" fill="#FFD040"/>
  <rect x="26" y="14" width="1" height="1" fill="#E0B030"/>
  
  <!-- 尾羽 -->
  <rect x="14" y="16" width="4" height="1" fill="#E0B030"/>
  <rect x="13" y="17" width="6" height="1" fill="#FFD040"/>
  
  <!-- 脚 - 中间 -->
  <rect x="14" y="18" width="2" height="1" fill="#FF8030"/>
  <rect x="16" y="18" width="2" height="1" fill="#FF8030"/>
  <rect x="14" y="19" width="2" height="1" fill="#E06020"/>
  <rect x="16" y="19" width="2" height="1" fill="#E06020"/>
</svg>
