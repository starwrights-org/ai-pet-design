<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Bird Walk Frame 2 - 中间，翅膀下 -->
  
  <!-- 头顶羽毛 -->
  <rect x="15" y="3" width="2" height="1" fill="#FFD040"/>
  <rect x="14" y="4" width="4" height="1" fill="#FFE060"/>
  
  <!-- 头部 -->
  <rect x="12" y="5" width="8" height="1" fill="#FFD040"/>
  <rect x="11" y="6" width="10" height="1" fill="#FFE060"/>
  <rect x="15" y="6" width="2" height="1" fill="#FFFFFF"/>
  <rect x="10" y="7" width="12" height="1" fill="#FFE060"/>
  <rect x="14" y="7" width="4" height="1" fill="#FFFFFF"/>
  
  <!-- 眼睛 -->
  <rect x="10" y="8" width="12" height="1" fill="#FFE060"/>
  <rect x="13" y="8" width="1" height="1" fill="#2A2A2A"/>
  <rect x="18" y="8" width="1" height="1" fill="#2A2A2A"/>
  
  <!-- 眼睛下+腮红 -->
  <rect x="10" y="9" width="12" height="1" fill="#FFE060"/>
  <rect x="13" y="9" width="1" height="1" fill="#2A2A2A"/>
  <rect x="18" y="9" width="1" height="1" fill="#2A2A2A"/>
  <rect x="11" y="9" width="1" height="1" fill="#FFB0C0"/>
  <rect x="20" y="9" width="1" height="1" fill="#FFB0C0"/>
  
  <!-- 嘴喙 -->
  <rect x="11" y="10" width="10" height="1" fill="#FFE060"/>
  <rect x="14" y="10" width="4" height="1" fill="#FF8030"/>
  <rect x="12" y="11" width="8" height="1" fill="#FFE060"/>
  <rect x="15" y="11" width="2" height="1" fill="#E06020"/>
  
  <!-- 身体 -->
  <rect x="12" y="12" width="8" height="1" fill="#FFE060"/>
  <rect x="14" y="12" width="4" height="1" fill="#FFFFFF"/>
  <rect x="12" y="13" width="8" height="1" fill="#FFE060"/>
  <rect x="15" y="13" width="2" height="1" fill="#FFFFFF"/>
  <rect x="13" y="14" width="6" height="1" fill="#FFE060"/>
  <rect x="14" y="15" width="4" height="1" fill="#FFD040"/>
  
  <!-- 左翅膀（下） -->
  <rect x="8" y="12" width="3" height="1" fill="#FFD040"/>
  <rect x="7" y="13" width="4" height="1" fill="#FFE060"/>
  <rect x="6" y="14" width="3" height="1" fill="#FFD040"/>
