  <!-- 嘴（下弯） -->
  <rect x="8" y="12" width="16" height="1" fill="#D4915A"/>
  <rect x="10" y="12" width="12" height="1" fill="#FFFFFF"/>
  <rect x="14" y="12" width="1" height="1" fill="#2A2A2A"/>
