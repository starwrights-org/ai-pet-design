<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Dog Sad Frame 1 - 耷拉耳朵 -->
  
  <!-- 左耳（下垂更多） -->
  <rect x="5" y="5" width="1" height="1" fill="#D4915A"/>
  <rect x="4" y="6" width="2" height="1" fill="#C4814A"/>
  <rect x="4" y="7" width="2" height="1" fill="#C4814A"/>
  <rect x="4" y="8" width="2" height="1" fill="#C4814A"/>
