<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Spirit Walk Frame 1 - 飘浮左移 -->
  
  <!-- 头顶星星 -->
  <rect x="14" y="2" width="2" height="1" fill="#FFE040"/>
  <rect x="13" y="3" width="4" height="1" fill="#FFF080"/>
  <rect x="14" y="4" width="2" height="1" fill="#FFE040"/>
  
  <!-- 头部 -->
  <rect x="10" y="5" width="10" height="1" fill="#C0D0FF"/>
  <rect x="8" y="6" width="14" height="1" fill="#B0C0FF"/>
  <rect x="14" y="6" width="2" height="1" fill="#FFFFFF"/>
  <rect x="7" y="7" width="16" height="1" fill="#A0B0F0"/>
  
  <!-- 眼睛（星星眼） -->
  <rect x="7" y="8" width="16" height="2" fill="#90A0E0"/>
  <rect x="11" y="8" width="1" height="2" fill="#FFE040"/>
  <rect x="18" y="8" width="1" height="2" fill="#FFE040"/>
  <rect x="8" y="9" width="1" height="1" fill="#FFB0C0"/>
  <rect x="21" y="9" width="1" height="1" fill="#FFB0C0"/>
  
  <!-- 嘴 -->
  <rect x="7" y="10" width="16" height="1" fill="#8090D0"/>
  <rect x="14" y="10" width="2" height="1" fill="#FF90B0"/>
  
  <!-- 翅膀（左展） -->
  <rect x="3" y="8" width="3" height="1" fill="#D0E0FF"/>
  <rect x="2" y="9" width="4" height="1" fill="#E0F0FF"/>
  <rect x="3" y="10" width="3" height="1" fill="#D0E0FF"/>
  <rect x="4" y="11" width="2" height="1" fill="#C0D0FF"/>
  
  <!-- 翅膀（右收） -->
  <rect x="24" y="9" width="2" height="1" fill="#C0D0FF"/>
  <rect x="24" y="10" width="2" height="1" fill="#B0C0FF"/>
  
  <!-- 身体 -->
  <rect x="8" y="11" width="14" height="1" fill="#7080C0"/>
  <rect x="10" y="12" width="10" height="1" fill="#6070B0"/>
  <rect x="11" y="13" width="8" height="1" fill="#6070B0"/>
  <rect x="12" y="14" width="6" height="1" fill="#5060A0"/>
  
  <!-- 魔法光点 -->
  <rect x="5" y="6" width="1" height="1" fill="#FFE080"/>
  <rect x="25" y="7" width="1" height="1" fill="#FFE080"/>
</svg>
