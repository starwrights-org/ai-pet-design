  <rect x="11" y="12" width="10" height="1" fill="#6070B0"/>
  <rect x="12" y="13" width="8" height="1" fill="#5060A0"/>
  
  <!-- 魔法光点（爆发） -->
  <rect x="4" y="3" width="1" height="1" fill="#FFFFFF"/>
  <rect x="27" y="3" width="1" height="1" fill="#FFFFFF"/>
  <rect x="2" y="10" width="1" height="1" fill="#FFE080"/>
  <rect x="29" y="10" width="1" height="1" fill="#FFE080"/>
  <rect x="6" y="14" width="1" height="1" fill="#FFD060"/>
