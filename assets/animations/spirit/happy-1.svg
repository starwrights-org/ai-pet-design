<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Spirit Happy Frame 1 - 开心飞舞 -->
  
  <!-- 头顶星星（超亮） -->
  <rect x="14" y="0" width="4" height="1" fill="#FFFFFF"/>
  <rect x="13" y="1" width="6" height="1" fill="#FFFFFF"/>
  <rect x="14" y="2" width="4" height="1" fill="#FFF080"/>
  <rect x="15" y="3" width="2" height="1" fill="#FFE040"/>
  
  <!-- 头部 -->
  <rect x="10" y="4" width="12" height="1" fill="#D0E0FF"/>
  <rect x="8" y="5" width="16" height="1" fill="#C0D0FF"/>
  <rect x="14" y="5" width="4" height="1" fill="#FFFFFF"/>
  <rect x="7" y="6" width="18" height="1" fill="#B0C0FF"/>
  
  <!-- 眼睛（弯弯笑眼） -->
  <rect x="7" y="7" width="18" height="2" fill="#A0B0F0"/>
  <rect x="10" y="7" width="4" height="1" fill="#FFE040"/>
  <rect x="18" y="7" width="4" height="1" fill="#FFE040"/>
  <rect x="11" y="8" width="2" height="1" fill="#FFE040"/>
