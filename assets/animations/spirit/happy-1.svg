  <rect x="8" y="8" width="1" height="1" fill="#FFB0C0"/>
  <rect x="23" y="8" width="1" height="1" fill="#FFB0C0"/>
  
  <!-- 嘴（大笑） -->
  <rect x="7" y="9" width="18" height="1" fill="#90A0E0"/>
  <rect x="13" y="9" width="6" height="1" fill="#FFC0D0"/>
  
  <!-- 翅膀（大展） -->
  <rect x="2" y="6" width="4" height="1" fill="#FFFFFF"/>
  <rect x="1" y="7" width="5" height="1" fill="#FFFFFF"/>
  <rect x="2" y="8" width="4" height="1" fill="#E0F0FF"/>
  <rect x="3" y="9" width="3" height="1" fill="#D0E0FF"/>
  
  <rect x="26" y="6" width="4" height="1" fill="#FFFFFF"/>
  <rect x="26" y="7" width="5" height="1" fill="#FFFFFF"/>
  <rect x="26" y="8" width="4" height="1" fill="#E0F0FF"/>
  <rect x="26" y="9" width="3" height="1" fill="#D0E0FF"/>
  
