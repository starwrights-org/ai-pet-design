  <!-- 翅膀（最大展开） -->
  <rect x="1" y="5" width="4" height="1" fill="#FFFFFF"/>
  <rect x="0" y="6" width="5" height="1" fill="#FFFFFF"/>
  <rect x="1" y="7" width="4" height="1" fill="#FFFFFF"/>
  <rect x="2" y="8" width="3" height="1" fill="#E0F0FF"/>
  
  <rect x="27" y="5" width="4" height="1" fill="#FFFFFF"/>
