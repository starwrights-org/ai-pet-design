  <rect x="12" y="2" width="8" height="1" fill="#FFFFFF"/>
  <rect x="14" y="3" width="4" height="1" fill="#FFF080"/>
  
  <!-- 头部 -->
  <rect x="9" y="4" width="14" height="1" fill="#E0F0FF"/>
