  <rect x="13" y="5" width="6" height="1" fill="#FFFFFF"/>
  <rect x="6" y="6" width="20" height="1" fill="#C0D0FF"/>
  
  <!-- 眼睛 -->
  <rect x="6" y="7" width="20" height="2" fill="#B0C0FF"/>
  <rect x="9" y="7" width="5" height="1" fill="#FFFFFF"/>
  <rect x="18" y="7" width="5" height="1" fill="#FFFFFF"/>
  <rect x="10" y="8" width="3" height="1" fill="#FFFFFF"/>
