  <!-- 能量散射粒子（大爆发） -->
  <rect x="2" y="3" width="1" height="1" fill="#FFFFFF"/>
  <rect x="29" y="3" width="1" height="1" fill="#FFFFFF"/>
  <rect x="1" y="7" width="1" height="1" fill="#F0C0FF"/>
  <rect x="30" y="7" width="1" height="1" fill="#F0C0FF"/>
  <rect x="3" y="11" width="1" height="1" fill="#E0A0FF"/>
  <rect x="28" y="11" width="1" height="1" fill="#E0A0FF"/>
  <rect x="5" y="14" width="1" height="1" fill="#D080FF"/>
  <rect x="26" y="14" width="1" height="1" fill="#D080FF"/>
</svg>
