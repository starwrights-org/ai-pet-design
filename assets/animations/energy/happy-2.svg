  <rect x="10" y="0" width="12" height="1" fill="#FFFFFF"/>
  <rect x="9" y="1" width="14" height="1" fill="#FFFFFF"/>
  <rect x="10" y="2" width="12" height="1" fill="#F0C0FF"/>
  
  <!-- 头部 -->
  <rect x="8" y="3" width="16" height="1" fill="#F0B0FF"/>
  <rect x="7" y="4" width="18" height="2" fill="#E0A0FF"/>
  <rect x="15" y="4" width="2" height="1" fill="#FFFFFF"/>
  
  <!-- 眼睛 -->
  <rect x="7" y="6" width="18" height="2" fill="#F0C0FF"/>
  <rect x="9" y="6" width="5" height="1" fill="#FFFFFF"/>
  <rect x="18" y="6" width="5" height="1" fill="#FFFFFF"/>
  <rect x="10" y="7" width="3" height="1" fill="#FFFFFF"/>
  <rect x="19" y="7" width="3" height="1" fill="#FFFFFF"/>
  
  <!-- 嘴 -->
  <rect x="7" y="8" width="18" height="1" fill="#FFFFFF"/>
  <rect x="12" y="8" width="8" height="1" fill="#FFD0E8"/>
  
  <!-- 身体 -->
  <rect x="8" y="9" width="16" height="1" fill="#F0C0FF"/>
