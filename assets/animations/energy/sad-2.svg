<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Energy Sad Frame 2 - 更暗淡 -->
  
  <!-- 顶部光晕（几乎消失） -->
  <rect x="14" y="6" width="4" height="1" fill="#6030A0"/>
  <rect x="13" y="7" width="6" height="1" fill="#7040B0"/>
  
  <!-- 头部 -->
  <rect x="11" y="8" width="10" height="1" fill="#6030A0"/>
  <rect x="10" y="9" width="12" height="2" fill="#502080"/>
  
  <!-- 眼睛（更悲伤） -->
  <rect x="10" y="11" width="12" height="2" fill="#6030A0"/>
  <rect x="11" y="11" width="1" height="1" fill="#7040B0"/>
  <rect x="12" y="12" width="1" height="1" fill="#7040B0"/>
  <rect x="20" y="11" width="1" height="1" fill="#7040B0"/>
  <rect x="19" y="12" width="1" height="1" fill="#7040B0"/>
  
  <!-- 能量眼泪 -->
  <rect x="11" y="13" width="1" height="1" fill="#8050C0"/>
  <rect x="20" y="13" width="1" height="1" fill="#8050C0"/>
  
  <!-- 嘴（更下弯） -->
  <rect x="10" y="13" width="12" height="1" fill="#7040B0"/>
  <rect x="13" y="13" width="1" height="1" fill="#4020A0"/>
  <rect x="18" y="13" width="1" height="1" fill="#4020A0"/>
  <rect x="14" y="14" width="4" height="1" fill="#4020A0"/>
  
  <!-- 身体 -->
  <rect x="11" y="14" width="10" height="1" fill="#6030A0"/>
  <rect x="12" y="15" width="8" height="1" fill="#502080"/>
  <rect x="12" y="16" width="8" height="1" fill="#4020A0"/>
  <rect x="13" y="17" width="6" height="1" fill="#301060"/>
  <rect x="13" y="18" width="6" height="1" fill="#200040"/>
  
  <!-- 底部波纹（最小） -->
  <rect x="12" y="19" width="8" height="1" fill="#100020"/>
  <rect x="11" y="20" width="10" height="1" fill="#080010"/>
</svg>
