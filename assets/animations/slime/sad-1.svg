<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Slime Sad Frame 1 - 难过瘫软 -->
  
  <!-- 顶部高光（暗淡） -->
  <rect x="14" y="8" width="4" height="1" fill="#70D0F0"/>
  
  <!-- 头部（压扁） -->
  <rect x="10" y="9" width="12" height="1" fill="#60C0E0"/>
  <rect x="8" y="10" width="16" height="1" fill="#50B0D0"/>
  
  <!-- 眼睛（悲伤下垂） -->
  <rect x="7" y="11" width="18" height="2" fill="#40A0C0"/>
  <rect x="11" y="11" width="1" height="1" fill="#2A2A2A"/>
  <rect x="12" y="12" width="1" height="1" fill="#2A2A2A"/>
  <rect x="20" y="11" width="1" height="1" fill="#2A2A2A"/>
  <rect x="19" y="12" width="1" height="1" fill="#2A2A2A"/>
  
  <!-- 眼泪 -->
  <rect x="10" y="13" width="1" height="1" fill="#80E0F0"/>
  <rect x="21" y="13" width="1" height="1" fill="#80E0F0"/>
  
  <!-- 嘴（下弯） -->
  <rect x="7" y="13" width="18" height="1" fill="#3090B0"/>
  <rect x="14" y="13" width="1" height="1" fill="#107090"/>
  <rect x="17" y="13" width="1" height="1" fill="#107090"/>
  <rect x="15" y="14" width="2" height="1" fill="#107090"/>
  
  <!-- 身体（瘫软宽扁） -->
  <rect x="6" y="14" width="20" height="1" fill="#2080A0"/>
  <rect x="5" y="15" width="22" height="1" fill="#107090"/>
  <rect x="5" y="16" width="22" height="1" fill="#106080"/>
  <rect x="6" y="17" width="20" height="1" fill="#206080"/>
</svg>
