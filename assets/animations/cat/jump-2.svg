  <rect x="8" y="8" width="16" height="1" fill="#F09050"/>
  <rect x="9" y="9" width="14" height="1" fill="#F09050"/>
  
  <!-- 鼻子 -->
  <rect x="15" y="9" width="2" height="1" fill="#2A2A2A"/>
  
  <rect x="10" y="10" width="12" height="1" fill="#F09050"/>
  
  <!-- 项圈 -->
  <rect x="11" y="11" width="10" height="1" fill="#FFD700"/>
  <rect x="15" y="11" width="2" height="1" fill="#FF3030"/>
  
  <!-- 身体 -->
  <rect x="10" y="12" width="12" height="1" fill="#F09050"/>
  <rect x="11" y="13" width="10" height="1" fill="#E08040"/>
  
