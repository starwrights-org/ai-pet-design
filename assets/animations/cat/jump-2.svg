  <rect x="11" y="16" width="2" height="1" fill="#D07030"/>
  <rect x="19" y="16" width="2" height="1" fill="#D07030"/>
  
  <!-- 脚（脚尖着地） -->
  <rect x="11" y="17" width="2" height="1" fill="#FFFFFF"/>
  <rect x="19" y="17" width="2" height="1" fill="#FFFFFF"/>
  
  <!-- 尾巴 -->
  <rect x="23" y="11" width="1" height="1" fill="#E08040"/>
  <rect x="24" y="12" width="1" height="1" fill="#F09050"/>
  <rect x="25" y="13" width="1" height="1" fill="#E08040"/>
