  <rect x="19" y="17" width="5" height="1" fill="#FFFFFF"/>
  
  <!-- 尾巴（向后弹） -->
  <rect x="24" y="13" width="1" height="1" fill="#E08040"/>
  <rect x="25" y="14" width="1" height="1" fill="#F09050"/>
  <rect x="26" y="15" width="1" height="1" fill="#E08040"/>
