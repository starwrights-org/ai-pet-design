  <!-- 项圈 -->
  <rect x="11" y="12" width="10" height="1" fill="#FFD700"/>
  <rect x="15" y="12" width="2" height="1" fill="#FF3030"/>
  
  <!-- 身体（压缩缓冲） -->
  <rect x="9" y="13" width="14" height="1" fill="#F09050"/>
