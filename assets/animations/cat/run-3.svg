  <rect x="25" y="3" width="1" height="1" fill="#D07030"/>
  <rect x="23" y="4" width="1" height="1" fill="#F09050"/>
  <rect x="24" y="4" width="1" height="1" fill="#FFCC99"/>
  <rect x="25" y="4" width="1" height="1" fill="#D07030"/>
  
  <!-- 头顶 -->
