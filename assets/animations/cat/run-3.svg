<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Cat Run Frame 3 - 右脚前伸 -->
  
  <!-- 左耳 -->
  <rect x="7" y="2" width="1" height="1" fill="#E08040"/>
  <rect x="6" y="3" width="1" height="1" fill="#D07030"/>
  <rect x="7" y="3" width="1" height="1" fill="#F09050"/>
  <rect x="8" y="3" width="1" height="1" fill="#E08040"/>
  <rect x="6" y="4" width="1" height="1" fill="#D07030"/>
  <rect x="7" y="4" width="1" height="1" fill="#FFCC99"/>
  <rect x="8" y="4" width="1" height="1" fill="#F09050"/>
  
  <!-- 右耳 -->
  <rect x="24" y="2" width="1" height="1" fill="#E08040"/>
