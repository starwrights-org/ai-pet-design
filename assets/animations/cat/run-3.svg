  <!-- 头部 -->
  <rect x="9" y="4" width="14" height="1" fill="#F09050"/>
  <rect x="8" y="5" width="16" height="1" fill="#F09050"/>
  <rect x="8" y="6" width="16" height="1" fill="#F09050"/>
  
  <!-- 眼睛 -->
  <rect x="11" y="6" width="1" height="1" fill="#2A2A2A"/>
  <rect x="20" y="6" width="1" height="1" fill="#2A2A2A"/>
  <rect x="11" y="7" width="1" height="1" fill="#2A2A2A"/>
  <rect x="20" y="7" width="1" height="1" fill="#2A2A2A"/>
  
  <!-- 腮红 -->
  <rect x="9" y="7" width="1" height="1" fill="#FFB0C0"/>
  <rect x="22" y="7" width="1" height="1" fill="#FFB0C0"/>
  
  <rect x="8" y="7" width="16" height="1" fill="#F09050"/>
  <rect x="9" y="8" width="14" height="1" fill="#F09050"/>
  
  <!-- 鼻子 -->
