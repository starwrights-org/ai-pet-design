  <!-- 身体 -->
  <rect x="10" y="11" width="12" height="1" fill="#F09050"/>
  <rect x="11" y="12" width="10" height="1" fill="#E08040"/>
  <rect x="12" y="13" width="8" height="1" fill="#D07030"/>
  
  <!-- 腿 - 右脚前伸，左脚后蹬 -->
  <rect x="22" y="14" width="1" height="1" fill="#D07030"/>
  <rect x="23" y="14" width="1" height="1" fill="#E08040"/>
  <rect x="24" y="14" width="1" height="1" fill="#F09050"/>
  <rect x="10" y="14" width="1" height="1" fill="#D07030"/>
  <rect x="11" y="14" width="1" height="1" fill="#E08040"/>
  
