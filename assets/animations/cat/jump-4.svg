  <rect x="10" y="6" width="12" height="1" fill="#F09050"/>
  
  <!-- 项圈 -->
  <rect x="11" y="7" width="10" height="1" fill="#FFD700"/>
  <rect x="15" y="7" width="2" height="1" fill="#FF3030"/>
  
  <!-- 身体 -->
  <rect x="10" y="8" width="12" height="1" fill="#F09050"/>
