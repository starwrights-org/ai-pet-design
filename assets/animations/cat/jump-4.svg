  <rect x="24" y="0" width="1" height="1" fill="#E08040"/>
  <rect x="23" y="1" width="1" height="1" fill="#E08040"/>
  <rect x="24" y="1" width="1" height="1" fill="#F09050"/>
  <rect x="25" y="1" width="1" height="1" fill="#D07030"/>
  
  <!-- 头部 -->
  <rect x="10" y="1" width="12" height="1" fill="#E08040"/>
