  <rect x="6" y="12" width="2" height="1" fill="#FFFFFF"/>
  <rect x="24" y="12" width="2" height="1" fill="#FFFFFF"/>
  
  <!-- 尾巴 -->
  <rect x="23" y="7" width="1" height="1" fill="#E08040"/>
  <rect x="24" y="6" width="1" height="1" fill="#F09050"/>
  <rect x="25" y="5" width="1" height="1" fill="#E08040"/>
  <rect x="26" y="4" width="1" height="1" fill="#F09050"/>
