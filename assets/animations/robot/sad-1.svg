<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Robot Sad Frame 1 - 难过 -->
  
  <!-- 天线（暗淡） -->
  <rect x="15" y="2" width="2" height="1" fill="#404050"/>
  <rect x="15" y="3" width="2" height="2" fill="#505060"/>
  
  <!-- 头部（低下） -->
  <rect x="10" y="5" width="12" height="1" fill="#505060"/>
  <rect x="9" y="6" width="14" height="1" fill="#707080"/>
  <rect x="8" y="7" width="16" height="2" fill="#909090"/>
  
  <!-- 眼睛（悲伤下垂） -->
  <rect x="8" y="9" width="16" height="2" fill="#909090"/>
  <rect x="11" y="9" width="1" height="1" fill="#2080C0"/>
  <rect x="12" y="10" width="1" height="1" fill="#2080C0"/>
  <rect x="20" y="9" width="1" height="1" fill="#2080C0"/>
  <rect x="19" y="10" width="1" height="1" fill="#2080C0"/>
  
  <!-- 嘴巴指示灯（下弯） -->
  <rect x="8" y="11" width="16" height="1" fill="#808090"/>
  <rect x="13" y="11" width="1" height="1" fill="#2080C0"/>
  <rect x="18" y="11" width="1" height="1" fill="#2080C0"/>
  <rect x="14" y="12" width="4" height="1" fill="#2080C0"/>
  
  <!-- 下巴 -->
  <rect x="9" y="12" width="14" height="1" fill="#707080"/>
  
  <!-- 脖子 -->
  <rect x="11" y="13" width="10" height="1" fill="#505060"/>
  
  <!-- 身体 -->
  <rect x="10" y="14" width="12" height="1" fill="#707080"/>
  <rect x="14" y="14" width="1" height="1" fill="#2080C0"/>
  <rect x="17" y="14" width="1" height="1" fill="#2080C0"/>
  <rect x="10" y="15" width="12" height="2" fill="#808090"/>
  <rect x="10" y="17" width="12" height="1" fill="#606070"/>
  
  <!-- 腿 -->
  <rect x="11" y="18" width="4" height="1" fill="#505060"/>
  <rect x="17" y="18" width="4" height="1" fill="#505060"/>
  
  <!-- 脚 -->
  <rect x="10" y="19" width="5" height="1" fill="#606070"/>
  <rect x="17" y="19" width="5" height="1" fill="#606070"/>
</svg>
