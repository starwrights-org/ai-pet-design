<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Robot Sad Frame 2 - 更难过 -->
  
  <!-- 天线（关闭） -->
  <rect x="15" y="3" width="2" height="1" fill="#303040"/>
  <rect x="15" y="4" width="2" height="2" fill="#404050"/>
  
  <!-- 头部（更低） -->
  <rect x="10" y="6" width="12" height="1" fill="#404050"/>
  <rect x="9" y="7" width="14" height="1" fill="#606070"/>
  <rect x="8" y="8" width="16" height="2" fill="#808090"/>
  
  <!-- 眼睛（更悲伤） -->
  <rect x="8" y="10" width="16" height="2" fill="#808090"/>
  <rect x="10" y="10" width="1" height="1" fill="#1060A0"/>
  <rect x="11" y="11" width="1" height="1" fill="#1060A0"/>
  <rect x="21" y="10" width="1" height="1" fill="#1060A0"/>
  <rect x="20" y="11" width="1" height="1" fill="#1060A0"/>
  
  <!-- 油液眼泪 -->
  <rect x="10" y="12" width="1" height="1" fill="#303030"/>
  <rect x="21" y="12" width="1" height="1" fill="#303030"/>
  
  <!-- 嘴巴指示灯（熄灭） -->
  <rect x="8" y="12" width="16" height="1" fill="#707080"/>
  <rect x="14" y="12" width="4" height="1" fill="#404050"/>
  
  <!-- 下巴 -->
  <rect x="9" y="13" width="14" height="1" fill="#606070"/>
  
  <!-- 脖子 -->
  <rect x="11" y="14" width="10" height="1" fill="#404050"/>
  
  <!-- 身体 -->
  <rect x="10" y="15" width="12" height="1" fill="#606070"/>
  <rect x="14" y="15" width="1" height="1" fill="#1060A0"/>
  <rect x="17" y="15" width="1" height="1" fill="#1060A0"/>
  <rect x="10" y="16" width="12" height="2" fill="#707080"/>
  <rect x="10" y="18" width="12" height="1" fill="#505060"/>
  
  <!-- 腿 -->
  <rect x="11" y="19" width="4" height="1" fill="#404050"/>
  <rect x="17" y="19" width="4" height="1" fill="#404050"/>
  
  <!-- 脚 -->
  <rect x="10" y="20" width="5" height="1" fill="#505060"/>
  <rect x="17" y="20" width="5" height="1" fill="#505060"/>
</svg>
