  <!-- 嘴（微笑） -->
  <rect x="240" y="280" width="32" height="8" fill="#FF90B0"/>
  
  <!-- 头顶光晕 -->
  <rect x="240" y="128" width="32" height="16" fill="#FFFFA0"/>
  <rect x="232" y="144" width="48" height="8" fill="#FFE080"/>
