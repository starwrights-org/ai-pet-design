  <rect x="400" y="380" width="8" height="8" fill="#E0E0FF"/>
  <rect x="320" y="420" width="8" height="8" fill="#FFFFFF"/>
  
  <!-- 中心Mote角色（可爱像素风） -->
  <!-- 身体主体（浅蓝色发光体） -->
  <rect x="176" y="160" width="160" height="16" fill="#80C0FF"/>
  <rect x="160" y="176" width="192" height="16" fill="#90D0FF"/>
  <rect x="144" y="192" width="224" height="16" fill="#A0E0FF"/>
  <rect x="128" y="208" width="256" height="16" fill="#B0F0FF"/>
  <rect x="128" y="224" width="256" height="16" fill="#C0F8FF"/>
  <rect x="128" y="240" width="256" height="16" fill="#C0F8FF"/>
  <rect x="128" y="256" width="256" height="16" fill="#B0F0FF"/>
  <rect x="144" y="272" width="224" height="16" fill="#A0E0FF"/>
  <rect x="160" y="288" width="192" height="16" fill="#90D0FF"/>
  <rect x="176" y="304" width="160" height="16" fill="#80C0FF"/>
  <rect x="192" y="320" width="128" height="16" fill="#70B0FF"/>
  
  <!-- 白色高光 -->
