  <rect x="160" y="192" width="64" height="16" fill="#FFFFFF"/>
  <rect x="160" y="208" width="48" height="16" fill="#FFFFFF"/>
  
  <!-- 眼睛（可爱的大眼睛） -->
  <rect x="192" y="224" width="32" height="48" fill="#2A2A5A"/>
