<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" style="image-rendering: pixelated;">
  <!-- Genesis Motes App Icon - 512x512 -->
  
  <!-- 背景渐变（深蓝到紫） -->
  <rect x="0" y="0" width="512" height="512" fill="#1A1A3A"/>
  <rect x="0" y="0" width="512" height="256" fill="#2A2A5A"/>
  <rect x="0" y="0" width="512" height="128" fill="#3A3A7A"/>
  
  <!-- 圆角遮罩效果（像素化） -->
  <rect x="0" y="0" width="64" height="64" fill="#000000"/>
  <rect x="448" y="0" width="64" height="64" fill="#000000"/>
  <rect x="0" y="448" width="64" height="64" fill="#000000"/>
  <rect x="448" y="448" width="64" height="64" fill="#000000"/>
  <rect x="0" y="0" width="32" height="96" fill="#000000"/>
  <rect x="0" y="0" width="96" height="32" fill="#000000"/>
  <rect x="480" y="0" width="32" height="96" fill="#000000"/>
  <rect x="416" y="0" width="96" height="32" fill="#000000"/>
  <rect x="0" y="416" width="32" height="96" fill="#000000"/>
  <rect x="0" y="480" width="96" height="32" fill="#000000"/>
  <rect x="480" y="416" width="32" height="96" fill="#000000"/>
