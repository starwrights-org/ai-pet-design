<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" style="image-rendering: pixelated;">
  <!-- Genesis Motes Favicon - 32x32 -->
  
  <!-- 背景 -->
  <rect x="0" y="0" width="32" height="32" fill="#2A2A5A"/>
  
  <!-- 圆角 -->
  <rect x="0" y="0" width="4" height="4" fill="#000000"/>
  <rect x="28" y="0" width="4" height="4" fill="#000000"/>
  <rect x="0" y="28" width="4" height="4" fill="#000000"/>
  <rect x="28" y="28" width="4" height="4" fill="#000000"/>
  
  <!-- Mote身体简化版 -->
  <rect x="10" y="8" width="12" height="2" fill="#A0E0FF"/>
