  <rect x="8" y="12" width="16" height="2" fill="#C0F8FF"/>
  <rect x="8" y="14" width="16" height="2" fill="#C0F8FF"/>
  <rect x="8" y="16" width="16" height="2" fill="#B0F0FF"/>
  <rect x="10" y="18" width="12" height="2" fill="#A0E0FF"/>
  <rect x="12" y="20" width="8" height="2" fill="#90D0FF"/>
  
  <!-- 高光 -->
