<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" style="image-rendering: pixelated;">
  <!-- Genesis Motes Favicon - 16x16 最小版 -->
  
  <!-- 背景 -->
  <rect x="0" y="0" width="16" height="16" fill="#2A2A5A"/>
  
  <!-- 圆角 -->
  <rect x="0" y="0" width="2" height="2" fill="#000000"/>
  <rect x="14" y="0" width="2" height="2" fill="#000000"/>
  <rect x="0" y="14" width="2" height="2" fill="#000000"/>
  <rect x="14" y="14" width="2" height="2" fill="#000000"/>
  
  <!-- Mote身体超简化 -->
  <rect x="5" y="4" width="6" height="1" fill="#A0E0FF"/>
  <rect x="4" y="5" width="8" height="1" fill="#C0F8FF"/>
  <rect x="4" y="6" width="8" height="1" fill="#C0F8FF"/>
  <rect x="4" y="7" width="8" height="1" fill="#C0F8FF"/>
  <rect x="4" y="8" width="8" height="1" fill="#B0F0FF"/>
  <rect x="5" y="9" width="6" height="1" fill="#A0E0FF"/>
  <rect x="6" y="10" width="4" height="1" fill="#90D0FF"/>
  
  <!-- 高光 -->
  <rect x="5" y="5" width="2" height="1" fill="#FFFFFF"/>
  
  <!-- 眼睛 -->
  <rect x="6" y="6" width="1" height="2" fill="#2A2A5A"/>
  <rect x="9" y="6" width="1" height="2" fill="#2A2A5A"/>
  
  <!-- 头顶光 -->
  <rect x="7" y="3" width="2" height="1" fill="#FFE040"/>
</svg>
