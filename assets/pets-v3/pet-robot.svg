<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Pet Robot - 16-bit Pixel Art Style -->
  <!-- 机器人，科技理性 -->
  
  <!-- 圆形阴影 -->
  <ellipse cx="32" cy="58" rx="16" ry="4" fill="#2A2A40" opacity="0.4"/>
  
  <!-- 天线 -->
  <rect x="30" y="2" width="4" height="8" fill="#707080"/>
  <ellipse cx="32" cy="2" rx="3" ry="3" fill="#00F5D4"/>
  <!-- 天线发光 -->
  <ellipse cx="32" cy="2" rx="2" ry="2" fill="#80FFEA" opacity="0.8"/>
  
  <!-- 头部 -->
  <rect x="16" y="10" width="32" height="24" fill="#B0B8C8"/>
  <rect x="14" y="12" width="4" height="20" fill="#A0A8B8"/>
  <rect x="46" y="12" width="4" height="20" fill="#A0A8B8"/>
  
  <!-- 头部高光 -->
  <rect x="18" y="12" width="12" height="6" fill="#D0D8E8" opacity="0.6"/>
  
  <!-- 头部边框 -->
  <rect x="16" y="10" width="32" height="2" fill="#808090"/>
  <rect x="16" y="32" width="32" height="2" fill="#808090"/>
  
  <!-- 眼睛（LED屏幕风格） -->
  <rect x="20" y="16" width="10" height="10" fill="#1A1A2E"/>
  <rect x="34" y="16" width="10" height="10" fill="#1A1A2E"/>
  
  <!-- 眼睛发光 -->
  <rect x="22" y="18" width="6" height="6" fill="#00F5D4"/>
  <rect x="36" y="18" width="6" height="6" fill="#00F5D4"/>
  
  <!-- 瞳孔/焦点 -->
  <rect x="24" y="20" width="2" height="2" fill="#FFFFFF"/>
  <rect x="38" y="20" width="2" height="2" fill="#FFFFFF"/>
  
  <!-- 嘴巴（扬声器格栅） -->
  <rect x="24" y="28" width="16" height="4" fill="#505060"/>
  <rect x="26" y="29" width="2" height="2" fill="#303040"/>
  <rect x="30" y="29" width="2" height="2" fill="#303040"/>
  <rect x="34" y="29" width="2" height="2" fill="#303040"/>
  <rect x="38" y="29" width="2" height="2" fill="#303040"/>
  
  <!-- 耳朵（传感器） -->
  <rect x="8" y="18" width="6" height="10" fill="#909098"/>
  <rect x="50" y="18" width="6" height="10" fill="#909098"/>
  <rect x="9" y="20" width="4" height="6" fill="#606068"/>
  <rect x="51" y="20" width="4" height="6" fill="#606068"/>
  
  <!-- 身体 -->
  <rect x="18" y="34" width="28" height="20" fill="#A0A8B8"/>
  
  <!-- 胸部面板 -->
  <rect x="24" y="38" width="16" height="12" fill="#1A1A2E"/>
  <rect x="26" y="40" width="12" height="8" fill="#0D0221"/>
  
  <!-- 胸部指示灯 -->
  <rect x="28" y="42" width="3" height="3" fill="#FF006E"/>
  <rect x="33" y="42" width="3" height="3" fill="#00F5D4"/>
  <rect x="28" y="47" width="8" height="2" fill="#8338EC"/>
  
  <!-- 手臂 -->
  <rect x="10" y="36" width="8" height="4" fill="#909098"/>
  <rect x="8" y="40" width="6" height="12" fill="#A0A8B8"/>
  <rect x="46" y="36" width="8" height="4" fill="#909098"/>
  <rect x="50" y="40" width="6" height="12" fill="#A0A8B8"/>
  
  <!-- 手 -->
  <rect x="6" y="50" width="8" height="6" fill="#B0B8C8"/>
  <rect x="50" y="50" width="8" height="6" fill="#B0B8C8"/>
  
  <!-- 腿 -->
  <rect x="22" y="54" width="8" height="6" fill="#808090"/>
  <rect x="34" y="54" width="8" height="6" fill="#808090"/>
  
  <!-- 脚 -->
  <rect x="20" y="58" width="10" height="2" fill="#606070"/>
  <rect x="34" y="58" width="10" height="2" fill="#606070"/>
</svg>