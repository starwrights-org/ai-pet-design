<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Pet Dog - 16-bit Pixel Art Style -->
  <!-- 金毛狗狗，忠诚友善 -->
  
  <!-- 圆形阴影 -->
  <ellipse cx="32" cy="58" rx="18" ry="4" fill="#2A2A40" opacity="0.4"/>
  
  <!-- 尾巴（摇摆姿态） -->
  <rect x="46" y="32" width="4" height="6" fill="#D4A574"/>
  <rect x="50" y="28" width="4" height="8" fill="#E8BC8A"/>
  <rect x="54" y="24" width="4" height="8" fill="#E8BC8A"/>
  
  <!-- 身体 -->
  <rect x="18" y="34" width="28" height="22" fill="#E8BC8A"/>
  <rect x="20" y="32" width="24" height="4" fill="#E8BC8A"/>
  
  <!-- 身体高光 -->
  <rect x="20" y="36" width="10" height="8" fill="#F5D4A8" opacity="0.6"/>
  
  <!-- 胸口白毛 -->
  <rect x="26" y="42" width="12" height="12" fill="#FFF8F0"/>
  
  <!-- 后腿 -->
  <rect x="18" y="50" width="8" height="10" fill="#D4A574"/>
  <rect x="38" y="50" width="8" height="10" fill="#D4A574"/>
  
  <!-- 脚掌 -->
  <rect x="18" y="58" width="8" height="2" fill="#A67B52"/>
  <rect x="38" y="58" width="8" height="2" fill="#A67B52"/>
  
  <!-- 头部 -->
  <rect x="14" y="10" width="32" height="26" fill="#E8BC8A"/>
  <rect x="12" y="12" width="4" height="22" fill="#E8BC8A"/>
  <rect x="44" y="12" width="4" height="22" fill="#E8BC8A"/>
  
  <!-- 头顶毛发 -->
  <rect x="18" y="8" width="24" height="4" fill="#D4A574"/>
  
  <!-- 头部高光 -->
  <rect x="16" y="12" width="12" height="8" fill="#F5D4A8" opacity="0.5"/>
  
  <!-- 耳朵（下垂） -->
  <rect x="8" y="14" width="8" height="20" fill="#D4A574"/>
  <rect x="6" y="18" width="4" height="14" fill="#D4A574"/>
  <rect x="48" y="14" width="8" height="20" fill="#D4A574"/>
  <rect x="54" y="18" width="4" height="14" fill="#D4A574"/>
  
  <!-- 耳内阴影 -->
  <rect x="10" y="18" width="4" height="12" fill="#C49460" opacity="0.5"/>
  <rect x="50" y="18" width="4" height="12" fill="#C49460" opacity="0.5"/>
  
  <!-- 眼睛 -->
  <rect x="20" y="18" width="8" height="8" fill="#FFFFFF"/>
  <rect x="36" y="18" width="8" height="8" fill="#FFFFFF"/>
  
  <!-- 瞳孔 -->
  <rect x="24" y="20" width="4" height="6" fill="#4A3520"/>
  <rect x="38" y="20" width="4" height="6" fill="#4A3520"/>
  
  <!-- 高光 -->
  <rect x="22" y="19" width="2" height="2" fill="#FFFFFF"/>
  <rect x="38" y="19" width="2" height="2" fill="#FFFFFF"/>
  
  <!-- 鼻子 -->
  <rect x="28" y="28" width="8" height="6" fill="#3A2A1A"/>
  <rect x="30" y="26" width="4" height="2" fill="#3A2A1A"/>
  
  <!-- 鼻子高光 -->
  <rect x="29" y="28" width="2" height="2" fill="#5A4A3A"/>
  
  <!-- 嘴巴/舌头 -->
  <rect x="30" y="34" width="4" height="2" fill="#F58A9A"/>
  <rect x="28" y="32" width="8" height="2" fill="#2A1A10"/>
  
  <!-- 眉毛 -->
  <rect x="20" y="16" width="6" height="2" fill="#C49460"/>
  <rect x="38" y="16" width="6" height="2" fill="#C49460"/>
</svg>