<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Pet Cat - 16-bit Pixel Art Style -->
  <!-- 灰色猫咪，优雅神秘 -->
  
  <!-- 圆形阴影 -->
  <ellipse cx="32" cy="58" rx="16" ry="4" fill="#2A2A40" opacity="0.4"/>
  
  <!-- 身体 -->
  <rect x="20" y="36" width="24" height="20" fill="#9DA3AF"/>
  <rect x="22" y="34" width="20" height="4" fill="#9DA3AF"/>
  
  <!-- 身体高光 -->
  <rect x="22" y="38" width="8" height="8" fill="#B8BCC6" opacity="0.6"/>
  
  <!-- 尾巴 -->
  <rect x="44" y="40" width="4" height="4" fill="#8A909B"/>
  <rect x="48" y="36" width="4" height="8" fill="#8A909B"/>
  <rect x="52" y="32" width="4" height="8" fill="#8A909B"/>
  <rect x="52" y="28" width="4" height="4" fill="#9DA3AF"/>
  
  <!-- 前腿 -->
  <rect x="22" y="52" width="6" height="8" fill="#8A909B"/>
  <rect x="36" y="52" width="6" height="8" fill="#8A909B"/>
  
  <!-- 脚掌 -->
  <rect x="22" y="58" width="6" height="2" fill="#F5CED4"/>
  <rect x="36" y="58" width="6" height="2" fill="#F5CED4"/>
  
  <!-- 头部 -->
  <rect x="18" y="12" width="28" height="24" fill="#9DA3AF"/>
  <rect x="16" y="14" width="4" height="20" fill="#9DA3AF"/>
  <rect x="44" y="14" width="4" height="20" fill="#9DA3AF"/>
  
  <!-- 头部高光 -->
  <rect x="20" y="14" width="10" height="8" fill="#B8BCC6" opacity="0.5"/>
  
  <!-- 耳朵 -->
  <polygon points="16,14 20,14 18,4" fill="#9DA3AF"/>
  <polygon points="44,14 48,14 46,4" fill="#9DA3AF"/>
  
  <!-- 耳内 -->
  <polygon points="17,13 19,13 18,7" fill="#F5CED4"/>
  <polygon points="45,13 47,13 46,7" fill="#F5CED4"/>
  
  <!-- 眼睛 -->
  <rect x="22" y="20" width="8" height="8" fill="#FFFFFF"/>
  <rect x="34" y="20" width="8" height="8" fill="#FFFFFF"/>
  
  <!-- 瞳孔 -->
  <rect x="26" y="22" width="4" height="6" fill="#3A5A8C"/>
  <rect x="36" y="22" width="4" height="6" fill="#3A5A8C"/>
  
  <!-- 高光 -->
  <rect x="24" y="21" width="2" height="2" fill="#FFFFFF"/>
  <rect x="36" y="21" width="2" height="2" fill="#FFFFFF"/>
  
  <!-- 鼻子 -->
  <rect x="30" y="28" width="4" height="3" fill="#F5A0B0"/>
  
  <!-- 嘴巴 -->
  <rect x="28" y="32" width="2" height="2" fill="#7A7A8A"/>
  <rect x="34" y="32" width="2" height="2" fill="#7A7A8A"/>
  <rect x="30" y="33" width="4" height="2" fill="#7A7A8A"/>
  
  <!-- 胡须 -->
  <rect x="10" y="26" width="10" height="1" fill="#D0D4DA"/>
  <rect x="12" y="30" width="8" height="1" fill="#D0D4DA"/>
  <rect x="44" y="26" width="10" height="1" fill="#D0D4DA"/>
  <rect x="44" y="30" width="8" height="1" fill="#D0D4DA"/>
</svg>