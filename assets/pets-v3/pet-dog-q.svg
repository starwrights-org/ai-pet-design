<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Pet Dog Q版 - 超萌大头狗 -->
  
  <!-- 圆形阴影 -->
  <ellipse cx="32" cy="60" rx="14" ry="3" fill="#5A4A30" opacity="0.3"/>
  
  <!-- 小身体 -->
  <ellipse cx="32" cy="54" rx="12" ry="8" fill="#F0C878"/>
  
  <!-- 胸口白毛 -->
  <ellipse cx="32" cy="56" rx="6" ry="5" fill="#FFF8F0"/>
  
  <!-- 身体高光 -->
  <ellipse cx="28" cy="52" rx="4" ry="3" fill="#FFE0A0" opacity="0.6"/>
  
  <!-- 小短腿 -->
  <ellipse cx="24" cy="58" rx="5" ry="3" fill="#E0B868"/>
  <ellipse cx="40" cy="58" rx="5" ry="3" fill="#E0B868"/>
  
  <!-- 尾巴（摇摇摇） -->
  <ellipse cx="50" cy="50" rx="5" ry="7" fill="#E0B868" transform="rotate(20 50 50)"/>
  
  <!-- 超大头 -->
  <ellipse cx="32" cy="28" rx="24" ry="22" fill="#F0C878"/>
  
  <!-- 头部高光 -->
  <ellipse cx="24" cy="20" rx="10" ry="8" fill="#FFE0A0" opacity="0.5"/>
  <ellipse cx="20" cy="16" rx="4" ry="3" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- 头顶毛茸茸 -->
  <ellipse cx="32" cy="8" rx="10" ry="5" fill="#E0B060"/>
  <ellipse cx="28" cy="6" rx="4" ry="3" fill="#D0A050"/>
  <ellipse cx="36" cy="6" rx="4" ry="3" fill="#D0A050"/>
  
  <!-- 大耳朵（垂耳） -->
  <ellipse cx="8" cy="26" rx="8" ry="14" fill="#D0A050"/>
  <ellipse cx="56" cy="26" rx="8" ry="14" fill="#D0A050"/>
  
  <!-- 耳内 -->
  <ellipse cx="10" cy="28" rx="4" ry="8" fill="#C09040" opacity="0.5"/>
  <ellipse cx="54" cy="28" rx="4" ry="8" fill="#C09040" opacity="0.5"/>
  
  <!-- 超大眼睛 -->
  <ellipse cx="22" cy="28" rx="9" ry="10" fill="#FFFFFF"/>
  <ellipse cx="42" cy="28" rx="9" ry="10" fill="#FFFFFF"/>
  
  <!-- 大瞳孔 -->
  <ellipse cx="24" cy="30" rx="5" ry="7" fill="#5A4030"/>
  <ellipse cx="44" cy="30" rx="5" ry="7" fill="#5A4030"/>
  
  <!-- 瞳孔深色 -->
  <ellipse cx="25" cy="32" rx="3" ry="4" fill="#3A2010"/>
  <ellipse cx="45" cy="32" rx="3" ry="4" fill="#3A2010"/>
  
  <!-- 大高光 -->
  <ellipse cx="20" cy="26" rx="3" ry="3" fill="#FFFFFF"/>
  <ellipse cx="40" cy="26" rx="3" ry="3" fill="#FFFFFF"/>
  <ellipse cx="26" cy="32" rx="1.5" ry="1.5" fill="#FFFFFF" opacity="0.8"/>
  <ellipse cx="46" cy="32" rx="1.5" ry="1.5" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- 大黑鼻子 -->
  <ellipse cx="32" cy="38" rx="5" ry="4" fill="#3A2A1A"/>
  <ellipse cx="30" cy="36" rx="2" ry="1.5" fill="#5A4A3A" opacity="0.6"/>
  
  <!-- 开心大嘴 -->
  <ellipse cx="32" cy="46" rx="8" ry="5" fill="#3A2A1A"/>
  <ellipse cx="32" cy="44" rx="6" ry="3" fill="#FF8090"/>
  
  <!-- 舌头 -->
  <ellipse cx="32" cy="48" rx="4" ry="4" fill="#FF90A0"/>
  <ellipse cx="32" cy="50" rx="3" ry="2" fill="#FF7080"/>
  
  <!-- 腮红 -->
  <ellipse cx="12" cy="38" rx="4" ry="3" fill="#FFB0C0" opacity="0.5"/>
  <ellipse cx="52" cy="38" rx="4" ry="3" fill="#FFB0C0" opacity="0.5"/>
  
  <!-- 眉毛（开心弯弯） -->
  <path d="M16,20 Q20,18 24,20" fill="none" stroke="#C09040" stroke-width="2" stroke-linecap="round"/>
  <path d="M40,20 Q44,18 48,20" fill="none" stroke="#C09040" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 爱心 -->
  <path d="M54,4 C52,2 50,4 50,6 C50,4 48,2 46,4 C44,6 46,10 50,14 C54,10 56,6 54,4" fill="#FF6080" opacity="0.8"/>
</svg>