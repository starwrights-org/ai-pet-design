<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Pet Bird Q版 - 超萌圆滚滚小鸟 -->
  
  <!-- 圆形阴影 -->
  <ellipse cx="32" cy="60" rx="12" ry="3" fill="#3A5A80" opacity="0.3"/>
  
  <!-- 尾羽 -->
  <ellipse cx="12" cy="44" rx="6" ry="4" fill="#5AA0E0"/>
  <ellipse cx="8" cy="46" rx="4" ry="3" fill="#4A90D0"/>
  <ellipse cx="14" cy="48" rx="4" ry="2" fill="#5AA0E0"/>
  
  <!-- 圆滚滚身体 -->
  <ellipse cx="32" cy="42" rx="18" ry="16" fill="#70B8F8"/>
  
  <!-- 身体高光 -->
  <ellipse cx="24" cy="36" rx="8" ry="6" fill="#90D0FF" opacity="0.6"/>
  <ellipse cx="20" cy="32" rx="4" ry="3" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- 白色肚肚 -->
  <ellipse cx="34" cy="48" rx="10" ry="8" fill="#FFFFFF"/>
  <ellipse cx="34" cy="48" rx="8" ry="6" fill="#F8F8FF"/>
  
  <!-- 小翅膀（收起） -->
  <ellipse cx="16" cy="40" rx="5" ry="8" fill="#5AA0E0"/>
  <ellipse cx="48" cy="40" rx="5" ry="8" fill="#5AA0E0"/>
  
  <!-- 翅膀高光 -->
  <ellipse cx="16" cy="38" rx="2" ry="4" fill="#70B8F8" opacity="0.6"/>
  <ellipse cx="48" cy="38" rx="2" ry="4" fill="#70B8F8" opacity="0.6"/>
  
  <!-- 超大头 -->
  <ellipse cx="32" cy="22" rx="20" ry="18" fill="#70B8F8"/>
  
  <!-- 头部高光 -->
  <ellipse cx="24" cy="14" rx="8" ry="6" fill="#90D0FF" opacity="0.5"/>
  <ellipse cx="20" cy="12" rx="3" ry="2" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- 头顶呆毛 -->
  <ellipse cx="32" cy="4" rx="4" ry="6" fill="#5AA0E0"/>
  <ellipse cx="28" cy="6" rx="2" ry="4" fill="#4A90D0"/>
  <ellipse cx="36" cy="6" rx="2" ry="4" fill="#4A90D0"/>
  
  <!-- 超大眼睛 -->
  <ellipse cx="24" cy="22" rx="8" ry="9" fill="#FFFFFF"/>
  <ellipse cx="40" cy="22" rx="8" ry="9" fill="#FFFFFF"/>
  
  <!-- 大瞳孔 -->
  <ellipse cx="26" cy="24" rx="4" ry="6" fill="#2A2A40"/>
  <ellipse cx="42" cy="24" rx="4" ry="6" fill="#2A2A40"/>
  
  <!-- 大高光 -->
  <ellipse cx="22" cy="20" rx="3" ry="3" fill="#FFFFFF"/>
  <ellipse cx="38" cy="20" rx="3" ry="3" fill="#FFFFFF"/>
  <ellipse cx="28" cy="26" rx="1.5" ry="1.5" fill="#FFFFFF" opacity="0.8"/>
  <ellipse cx="44" cy="26" rx="1.5" ry="1.5" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- 圆圆橙喙 -->
  <ellipse cx="32" cy="32" rx="5" ry="4" fill="#FFB050"/>
  <ellipse cx="32" cy="30" rx="4" ry="3" fill="#FFC070"/>
  <ellipse cx="30" cy="29" rx="1.5" ry="1" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- 腮红 -->
  <ellipse cx="14" cy="28" rx="4" ry="3" fill="#FFB0C0" opacity="0.6"/>
  <ellipse cx="50" cy="28" rx="4" ry="3" fill="#FFB0C0" opacity="0.6"/>
  
  <!-- 小脚丫 -->
  <ellipse cx="28" cy="56" rx="3" ry="2" fill="#F0A040"/>
  <ellipse cx="36" cy="56" rx="3" ry="2" fill="#F0A040"/>
  
  <!-- 音符（唱歌） -->
  <text x="50" y="12" font-size="10" fill="#FFB050" opacity="0.8">♪</text>
  <text x="56" y="8" font-size="8" fill="#FF90A0" opacity="0.6">♫</text>
</svg>