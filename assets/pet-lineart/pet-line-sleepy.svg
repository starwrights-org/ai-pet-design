<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256">
  <!-- 线条风格 AI Pet - Sleepy 困倦 -->
  
  <style>
    .main-line { fill: none; stroke: #3A3A3A; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .thin-line { fill: none; stroke: #3A3A3A; stroke-width: 1.5; stroke-linecap: round; }
    .fill-body { fill: #FFFFFF; }
    .fill-cheek { fill: #FFD4D4; }
    .fill-accent { fill: #7DD3C0; }
  </style>
  
  <!-- 身体 - 稍微蜷缩 -->
  <ellipse cx="32" cy="42" rx="22" ry="16" class="fill-body"/>
  <ellipse cx="32" cy="42" rx="22" ry="16" class="main-line"/>
  
  <!-- 耳朵 - 放松下垂 -->
  <path d="M 12 34 Q 6 28 10 22 Q 16 26 16 32" class="fill-body"/>
  <path d="M 12 34 Q 6 28 10 22 Q 16 26 16 32" class="main-line"/>
  <path d="M 52 34 Q 58 28 54 22 Q 48 26 48 32" class="fill-body"/>
  <path d="M 52 34 Q 58 28 54 22 Q 48 26 48 32" class="main-line"/>
  
  <!-- 眼睛 - 闭着的弯弯 -->
  <path d="M 20 38 Q 24 40 28 38" class="main-line" style="stroke-width:2"/>
  <path d="M 36 38 Q 40 40 44 38" class="main-line" style="stroke-width:2"/>
  
  <!-- 嘴巴 - 小小的 o -->
  <ellipse cx="32" cy="46" rx="2" ry="1.5" class="main-line" fill="#FFFFFF"/>
  
  <!-- 腮红 -->
  <ellipse cx="14" cy="42" rx="4" ry="2.5" class="fill-cheek" opacity="0.5"/>
  <ellipse cx="50" cy="42" rx="4" ry="2.5" class="fill-cheek" opacity="0.5"/>
  
  <!-- 小脚 - 收起来 -->
  <ellipse cx="26" cy="54" rx="4" ry="2.5" class="fill-body"/>
  <ellipse cx="26" cy="54" rx="4" ry="2.5" class="main-line"/>
  <ellipse cx="38" cy="54" rx="4" ry="2.5" class="fill-body"/>
  <ellipse cx="38" cy="54" rx="4" ry="2.5" class="main-line"/>
  
  <!-- 领结 -->
  <g transform="translate(32, 52)">
    <polygon points="-5,0 0,-2.5 5,0 0,2.5" class="fill-accent" opacity="0.8"/>
    <polygon points="-5,0 0,-2.5 5,0 0,2.5" class="main-line" style="stroke-width:1.5"/>
  </g>
  
  <!-- Zzz 睡眠效果 -->
  <text x="50" y="24" font-family="sans-serif" font-size="10" fill="#3A3A3A" opacity="0.6">z</text>
  <text x="54" y="18" font-family="sans-serif" font-size="8" fill="#3A3A3A" opacity="0.4">z</text>
  <text x="57" y="14" font-family="sans-serif" font-size="6" fill="#3A3A3A" opacity="0.3">z</text>
</svg>