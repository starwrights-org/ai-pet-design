<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" style="image-rendering: pixelated;">
  <!-- Stone Tile 32x32 - 石板路，可无缝平铺 -->
  
  <!-- 基础石板底色 -->
  <rect x="0" y="0" width="32" height="32" fill="#9E9E9E"/>
  
  <!-- 砖缝 - 横向 -->
  <rect x="0" y="0" width="32" height="1" fill="#757575"/>
  <rect x="0" y="7" width="32" height="1" fill="#757575"/>
  <rect x="0" y="15" width="32" height="1" fill="#757575"/>
  <rect x="0" y="23" width="32" height="1" fill="#757575"/>
  <rect x="0" y="31" width="32" height="1" fill="#757575"/>
  
  <!-- 砖缝 - 纵向（交错） -->
  <rect x="0" y="1" width="1" height="6" fill="#757575"/>
  <rect x="15" y="1" width="1" height="6" fill="#757575"/>
  <rect x="31" y="1" width="1" height="6" fill="#757575"/>
  
  <rect x="7" y="8" width="1" height="7" fill="#757575"/>
  <rect x="23" y="8" width="1" height="7" fill="#757575"/>
  
  <rect x="0" y="16" width="1" height="7" fill="#757575"/>
  <rect x="15" y="16" width="1" height="7" fill="#757575"/>
  <rect x="31" y="16" width="1" height="7" fill="#757575"/>
  
  <rect x="7" y="24" width="1" height="7" fill="#757575"/>
  <rect x="23" y="24" width="1" height="7" fill="#757575"/>
  
  <!-- 高光 -->
  <rect x="2" y="2" width="2" height="1" fill="#BDBDBD"/>
  <rect x="10" y="3" width="1" height="1" fill="#E0E0E0"/>
  <rect x="18" y="2" width="2" height="1" fill="#BDBDBD"/>
  <rect x="26" y="4" width="1" height="1" fill="#E0E0E0"/>
  
  <rect x="9" y="10" width="2" height="1" fill="#BDBDBD"/>
  <rect x="17" y="11" width="1" height="1" fill="#E0E0E0"/>
  <rect x="26" y="9" width="2" height="1" fill="#BDBDBD"/>
  
  <rect x="3" y="18" width="1" height="1" fill="#E0E0E0"/>
  <rect x="10" y="17" width="2" height="1" fill="#BDBDBD"/>
  <rect x="20" y="19" width="1" height="1" fill="#E0E0E0"/>
  <rect x="27" y="18" width="1" height="1" fill="#BDBDBD"/>
  
  <rect x="9" y="26" width="1" height="1" fill="#E0E0E0"/>
  <rect x="17" y="25" width="2" height="1" fill="#BDBDBD"/>
  <rect x="28" y="27" width="1" height="1" fill="#E0E0E0"/>
  
  <!-- 深色阴影 -->
  <rect x="5" y="5" width="1" height="1" fill="#616161"/>
  <rect x="12" y="4" width="1" height="1" fill="#616161"/>
  <rect x="22" y="5" width="1" height="1" fill="#616161"/>
  <rect x="29" y="3" width="1" height="1" fill="#616161"/>
  
  <rect x="3" y="12" width="1" height="1" fill="#616161"/>
  <rect x="14" y="13" width="1" height="1" fill="#616161"/>
  <rect x="20" y="12" width="1" height="1" fill="#616161"/>
  
  <rect x="6" y="20" width="1" height="1" fill="#616161"/>
  <rect x="13" y="21" width="1" height="1" fill="#616161"/>
  <rect x="25" y="20" width="1" height="1" fill="#616161"/>
  
  <rect x="4" y="28" width="1" height="1" fill="#616161"/>
