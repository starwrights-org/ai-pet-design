<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128">
  <!-- 清新日系AI Pet - Excited State -->
  <!-- 配色: 柔粉+米色+金色点缀 -->
  
  <!-- 身体 - 略微跳起 -->
  <ellipse cx="32" cy="34" rx="24" ry="22" fill="#FFE4E1" />
  
  <!-- 耳朵 - 竖直兴奋 -->
  <ellipse cx="14" cy="14" rx="6" ry="9" fill="#FFE4E1" transform="rotate(-5 14 14)" />
  <ellipse cx="14" cy="14" rx="4" ry="6" fill="#FFB6C1" transform="rotate(-5 14 14)" />
  <ellipse cx="50" cy="14" rx="6" ry="9" fill="#FFE4E1" transform="rotate(5 50 14)" />
  <ellipse cx="50" cy="14" rx="4" ry="6" fill="#FFB6C1" transform="rotate(5 50 14)" />
  
  <!-- 脸部高光 -->
  <ellipse cx="32" cy="30" rx="18" ry="16" fill="#FFF5EE" opacity="0.4" />
  
  <!-- 眼睛 - 闪亮的大眼睛 -->
  <ellipse cx="24" cy="30" rx="6" ry="7" fill="#483D3F" />
  <ellipse cx="40" cy="30" rx="6" ry="7" fill="#483D3F" />
  <!-- 眼睛高光 - 大而闪亮 -->
  <circle cx="27" cy="28" r="2.5" fill="white" />
  <circle cx="43" cy="28" r="2.5" fill="white" />
  <circle cx="23" cy="32" r="1.2" fill="white" opacity="0.7" />
  <circle cx="39" cy="32" r="1.2" fill="white" opacity="0.7" />
  
  <!-- 星星眼效果 -->
  <path d="M 26 28 l 1 -2 l 1 2 l 2 -1 l -2 1 l 2 1 l -2 -1 l -1 2 l -1 -2" fill="#FFD700" opacity="0.6" transform="scale(0.6) translate(36, 42)" />
  <path d="M 42 28 l 1 -2 l 1 2 l 2 -1 l -2 1 l 2 1 l -2 -1 l -1 2 l -1 -2" fill="#FFD700" opacity="0.6" transform="scale(0.6) translate(63, 42)" />
  
  <!-- 脸红 - 红扑扑 -->
  <ellipse cx="14" cy="36" rx="5" ry="3" fill="#FFB6C1" opacity="0.7" />
  <ellipse cx="50" cy="36" rx="5" ry="3" fill="#FFB6C1" opacity="0.7" />
  
  <!-- 嘴巴 - 大大的开心笑容 -->
  <path d="M 24 42 Q 32 52 40 42" stroke="#E8967A" stroke-width="2" fill="#FFB6B6" stroke-linecap="round" />
  
  <!-- 小脚 - 跳起来 -->
  <ellipse cx="22" cy="52" rx="6" ry="4" fill="#FFD5CD" />
  <ellipse cx="42" cy="52" rx="6" ry="4" fill="#FFD5CD" />
  
  <!-- 装饰 - 薄荷色蝴蝶结 -->
  <g transform="translate(32, 8)">
    <ellipse cx="-6" cy="0" rx="5" ry="3.5" fill="#98D8C8" />
    <ellipse cx="6" cy="0" rx="5" ry="3.5" fill="#98D8C8" />
    <circle cx="0" cy="0" r="2.5" fill="#7FC8B8" />
  </g>
  
  <!-- 兴奋的光芒效果 -->
  <circle cx="8" cy="20" r="2" fill="#FFD700" opacity="0.5" />
  <circle cx="56" cy="20" r="2" fill="#FFD700" opacity="0.5" />
  <circle cx="10" cy="50" r="1.5" fill="#FFD700" opacity="0.4" />
  <circle cx="54" cy="50" r="1.5" fill="#FFD700" opacity="0.4" />
</svg>