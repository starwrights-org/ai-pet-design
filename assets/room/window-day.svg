<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" width="256" height="192" style="image-rendering: pixelated;">
  <!-- 窗户 - 白天 9-16点 64x48px -->
  
  <!-- 外框（深棕木质） -->
  <rect x="0" y="0" width="64" height="48" fill="#4A3728"/>
  <rect x="2" y="2" width="60" height="44" fill="#5C4332"/>
  
  <!-- 窗户玻璃区域（蓝天） -->
  <rect x="4" y="4" width="26" height="18" fill="#87CEEB"/>
  <rect x="34" y="4" width="26" height="18" fill="#87CEEB"/>
  <rect x="4" y="26" width="26" height="18" fill="#A0D8F0"/>
  <rect x="34" y="26" width="26" height="18" fill="#A0D8F0"/>
  
  <!-- 天空渐变 -->
  <rect x="4" y="4" width="56" height="6" fill="#70C0E8"/>
  <rect x="4" y="38" width="56" height="6" fill="#B0E0F8"/>
  
  <!-- 太阳（右上） -->
  <rect x="46" y="6" width="10" height="10" fill="#FFE040"/>
  <rect x="48" y="4" width="6" height="2" fill="#FFE040"/>
  <rect x="48" y="16" width="6" height="2" fill="#FFE040"/>
  <rect x="44" y="8" width="2" height="6" fill="#FFE040"/>
  <rect x="56" y="8" width="2" height="6" fill="#FFE040"/>
  <rect x="48" y="8" width="6" height="6" fill="#FFFFA0"/>
  
  <!-- 白云 -->
  <rect x="6" y="8" width="10" height="4" fill="#FFFFFF"/>
  <rect x="4" y="10" width="14" height="3" fill="#FFFFFF"/>
  <rect x="8" y="6" width="6" height="2" fill="#FFFFFF"/>
  
  <rect x="18" y="14" width="8" height="3" fill="#FFFFFF"/>
  <rect x="16" y="15" width="12" height="2" fill="#FFFFFF"/>
  
  <rect x="38" y="28" width="8" height="3" fill="#FFFFFF"/>
  <rect x="36" y="29" width="12" height="2" fill="#FFFFFF"/>
  
  <rect x="8" y="32" width="10" height="3" fill="#FFFFFF"/>
  <rect x="6" y="33" width="14" height="2" fill="#FFFFFF"/>
  
  <!-- 中间窗框（木质） -->
  <rect x="30" y="4" width="4" height="40" fill="#5C4332"/>
  <rect x="4" y="22" width="56" height="4" fill="#5C4332"/>
  
  <!-- 窗框高光 -->
  <rect x="4" y="4" width="26" height="1" fill="#7A6352"/>
  <rect x="34" y="4" width="26" height="1" fill="#7A6352"/>
  <rect x="4" y="26" width="26" height="1" fill="#7A6352"/>
  <rect x="34" y="26" width="26" height="1" fill="#7A6352"/>
  
  <!-- 窗台 -->
  <rect x="0" y="46" width="64" height="2" fill="#3A2718"/>
</svg>
