<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 28" width="256" height="112" style="image-rendering: pixelated;">
  <!-- 宠物床 - 软垫质感 64x28px -->
  
  <!-- 床底阴影 -->
  <rect x="4" y="24" width="56" height="4" fill="#2A2020"/>
  
  <!-- 床框（浅棕木质） -->
  <rect x="2" y="18" width="60" height="8" fill="#8A6A50"/>
  <rect x="0" y="20" width="64" height="6" fill="#7A5A40"/>
  <rect x="4" y="18" width="56" height="2" fill="#9A7A60"/>
  
  <!-- 床垫（米色） -->
  <rect x="6" y="8" width="52" height="12" fill="#E8D8C8"/>
  <rect x="4" y="10" width="56" height="8" fill="#E8D8C8"/>
  <rect x="8" y="6" width="48" height="14" fill="#E8D8C8"/>
  
  <!-- 床垫高光 -->
  <rect x="8" y="8" width="48" height="2" fill="#F8F0E8"/>
  <rect x="10" y="6" width="44" height="2" fill="#FFF8F0"/>
  
  <!-- 床垫缝线纹理 -->
  <rect x="16" y="10" width="1" height="8" fill="#D8C8B8"/>
  <rect x="32" y="10" width="1" height="8" fill="#D8C8B8"/>
  <rect x="48" y="10" width="1" height="8" fill="#D8C8B8"/>
  
  <!-- 枕头（左侧） -->
  <rect x="8" y="4" width="16" height="8" fill="#F0E0D0"/>
  <rect x="10" y="2" width="12" height="10" fill="#F0E0D0"/>
  <rect x="10" y="4" width="12" height="2" fill="#FFF0E0"/>
  <rect x="12" y="2" width="8" height="2" fill="#FFFAF0"/>
  
  <!-- 枕头缝线 -->
  <rect x="14" y="6" width="1" height="4" fill="#E0D0C0"/>
  
  <!-- 床边装饰（小爪印） -->
  <rect x="42" y="10" width="2" height="2" fill="#D0C0B0"/>
  <rect x="40" y="12" width="2" height="1" fill="#D0C0B0"/>
  <rect x="44" y="12" width="2" height="1" fill="#D0C0B0"/>
  <rect x="41" y="14" width="1" height="1" fill="#D0C0B0"/>
  <rect x="43" y="14" width="1" height="1" fill="#D0C0B0"/>
</svg>
