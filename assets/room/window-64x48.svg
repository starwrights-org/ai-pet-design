<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" width="256" height="192" style="image-rendering: pixelated;">
  <!-- 窗户 - 带月光效果 64x48px -->
  
  <!-- 外框（深棕木质） -->
  <rect x="0" y="0" width="64" height="48" fill="#4A3728"/>
  <rect x="2" y="2" width="60" height="44" fill="#5C4332"/>
  
  <!-- 窗户玻璃区域（夜空） -->
  <rect x="4" y="4" width="26" height="18" fill="#1A1A3A"/>
  <rect x="34" y="4" width="26" height="18" fill="#1A1A3A"/>
  <rect x="4" y="26" width="26" height="18" fill="#1A1A3A"/>
  <rect x="34" y="26" width="26" height="18" fill="#1A1A3A"/>
  
  <!-- 月亮（右上窗格） -->
  <rect x="48" y="8" width="8" height="8" fill="#FFFDE0"/>
  <rect x="50" y="6" width="4" height="2" fill="#FFFDE0"/>
  <rect x="50" y="16" width="4" height="2" fill="#FFFDE0"/>
  <rect x="46" y="10" width="2" height="4" fill="#FFFDE0"/>
  <rect x="56" y="10" width="2" height="4" fill="#FFFDE0"/>
  
  <!-- 星星 -->
  <rect x="8" y="8" width="2" height="2" fill="#FFFFFF"/>
  <rect x="18" y="12" width="2" height="2" fill="#FFFFFF"/>
  <rect x="12" y="16" width="2" height="2" fill="#E0E0FF"/>
  <rect x="40" y="30" width="2" height="2" fill="#FFFFFF"/>
  <rect x="52" y="34" width="2" height="2" fill="#E0E0FF"/>
  <rect x="10" y="32" width="2" height="2" fill="#FFFFFF"/>
  <rect x="22" y="36" width="2" height="2" fill="#E0E0FF"/>
  
  <!-- 月光光晕（淡蓝） -->
  <rect x="44" y="6" width="16" height="14" fill="#4060A0" fill-opacity="0.3"/>
  
  <!-- 中间窗框（木质） -->
  <rect x="30" y="4" width="4" height="40" fill="#5C4332"/>
  <rect x="4" y="22" width="56" height="4" fill="#5C4332"/>
  
  <!-- 窗框高光 -->
  <rect x="4" y="4" width="26" height="1" fill="#7A6352"/>
  <rect x="34" y="4" width="26" height="1" fill="#7A6352"/>
  <rect x="4" y="26" width="26" height="1" fill="#7A6352"/>
  <rect x="34" y="26" width="26" height="1" fill="#7A6352"/>
  
  <!-- 窗台 -->
  <rect x="0" y="46" width="64" height="2" fill="#3A2718"/>
</svg>
