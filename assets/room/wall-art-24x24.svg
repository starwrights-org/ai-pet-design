<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="96" height="96" style="image-rendering: pixelated;">
  <!-- 墙上挂画 - 风景画 24x24px -->
  
  <!-- 画框阴影 -->
  <rect x="2" y="22" width="22" height="2" fill="#2A2020"/>
  <rect x="22" y="2" width="2" height="20" fill="#2A2020"/>
  
  <!-- 画框外框（金色） -->
  <rect x="0" y="0" width="24" height="24" fill="#C0A060"/>
  <rect x="1" y="1" width="22" height="22" fill="#D4B878"/>
  
  <!-- 画框内框 -->
  <rect x="2" y="2" width="20" height="20" fill="#A08040"/>
  
  <!-- 画布 -->
  <rect x="3" y="3" width="18" height="18" fill="#87CEEB"/>
  
  <!-- 风景画内容 -->
  <!-- 天空 -->
  <rect x="3" y="3" width="18" height="8" fill="#87CEEB"/>
  
  <!-- 太阳 -->
  <rect x="16" y="4" width="4" height="4" fill="#FFE040"/>
  <rect x="17" y="5" width="2" height="2" fill="#FFFFA0"/>
  
  <!-- 云 -->
  <rect x="5" y="5" width="6" height="2" fill="#FFFFFF"/>
  <rect x="4" y="6" width="8" height="2" fill="#FFFFFF"/>
  
  <!-- 山 -->
  <rect x="3" y="10" width="8" height="6" fill="#6B8E4A"/>
  <rect x="5" y="8" width="4" height="2" fill="#7A9E5A"/>
  <rect x="6" y="7" width="2" height="1" fill="#8AAE6A"/>
  
  <rect x="9" y="12" width="8" height="4" fill="#5A7E3A"/>
  <rect x="11" y="10" width="4" height="2" fill="#6B8E4A"/>
  <rect x="12" y="9" width="2" height="1" fill="#7A9E5A"/>
  
  <!-- 草地 -->
  <rect x="3" y="16" width="18" height="5" fill="#90B060"/>
  <rect x="3" y="18" width="18" height="3" fill="#80A050"/>
  
  <!-- 花朵装饰 -->
  <rect x="6" y="17" width="2" height="2" fill="#FF6080"/>
  <rect x="14" y="18" width="2" height="2" fill="#FFE040"/>
  <rect x="10" y="17" width="2" height="2" fill="#FF80A0"/>
  
  <!-- 画框高光 -->
  <rect x="1" y="1" width="22" height="1" fill="#E8D098"/>
  <rect x="1" y="1" width="1" height="22" fill="#E8D098"/>
</svg>
