<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 32" width="192" height="128" style="image-rendering: pixelated;">
  <!-- 书架 - 带彩色书 48x32px -->
  
  <!-- 书架背板 -->
  <rect x="0" y="0" width="48" height="32" fill="#5C4332"/>
  <rect x="2" y="2" width="44" height="28" fill="#6B5344"/>
  
  <!-- 书架层板 -->
  <rect x="2" y="14" width="44" height="2" fill="#4A3728"/>
  <rect x="2" y="30" width="44" height="2" fill="#4A3728"/>
  
  <!-- 上层书籍 -->
  <!-- 红色书 -->
  <rect x="4" y="4" width="6" height="10" fill="#C04040"/>
  <rect x="4" y="4" width="1" height="10" fill="#A03030"/>
  <rect x="9" y="4" width="1" height="10" fill="#E06060"/>
  
  <!-- 蓝色书 -->
  <rect x="12" y="3" width="7" height="11" fill="#4060A0"/>
  <rect x="12" y="3" width="1" height="11" fill="#305080"/>
  <rect x="18" y="3" width="1" height="11" fill="#6080C0"/>
  
  <!-- 绿色书 -->
  <rect x="21" y="5" width="5" height="9" fill="#40A060"/>
  <rect x="21" y="5" width="1" height="9" fill="#308050"/>
  <rect x="25" y="5" width="1" height="9" fill="#60C080"/>
  
  <!-- 黄色书 -->
  <rect x="28" y="4" width="6" height="10" fill="#D0A040"/>
  <rect x="28" y="4" width="1" height="10" fill="#B08030"/>
  <rect x="33" y="4" width="1" height="10" fill="#E0C060"/>
  
  <!-- 紫色书 -->
  <rect x="36" y="3" width="8" height="11" fill="#8060A0"/>
  <rect x="36" y="3" width="1" height="11" fill="#605080"/>
  <rect x="43" y="3" width="1" height="11" fill="#A080C0"/>
  
  <!-- 下层书籍 -->
  <!-- 橙色书 -->
  <rect x="4" y="18" width="7" height="12" fill="#D07040"/>
  <rect x="4" y="18" width="1" height="12" fill="#B05030"/>
  <rect x="10" y="18" width="1" height="12" fill="#E09060"/>
  
  <!-- 青色书 -->
  <rect x="13" y="17" width="5" height="13" fill="#40A0A0"/>
  <rect x="13" y="17" width="1" height="13" fill="#308080"/>
  <rect x="17" y="17" width="1" height="13" fill="#60C0C0"/>
  
  <!-- 粉色书 -->
  <rect x="20" y="19" width="6" height="11" fill="#D080A0"/>
  <rect x="20" y="19" width="1" height="11" fill="#B06080"/>
  <rect x="25" y="19" width="1" height="11" fill="#E0A0C0"/>
  
  <!-- 小摆件（花盆） -->
  <rect x="28" y="24" width="8" height="6" fill="#A06040"/>
  <rect x="30" y="20" width="4" height="4" fill="#40A040"/>
  <rect x="31" y="18" width="2" height="2" fill="#60C060"/>
  
  <!-- 书籍标签/装饰线 -->
  <rect x="5" y="7" width="4" height="1" fill="#FFE0A0"/>
  <rect x="14" y="6" width="4" height="1" fill="#FFE0A0"/>
  <rect x="29" y="7" width="4" height="1" fill="#FFE0A0"/>
</svg>
