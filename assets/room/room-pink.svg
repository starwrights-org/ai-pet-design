<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="640" height="480" style="image-rendering: pixelated;">
  <!-- 像素风格房间场景 - 可爱粉色版 -->
  
  <defs>
    <pattern id="pinkFloor" x="0" y="0" width="32" height="16" patternUnits="userSpaceOnUse">
      <rect width="32" height="16" fill="#F0E0D0"/>
      <rect x="0" y="0" width="16" height="8" fill="#F8E8D8"/>
      <rect x="16" y="8" width="16" height="8" fill="#F8E8D8"/>
      <rect x="0" y="0" width="32" height="1" fill="#E0D0C0"/>
    </pattern>
  </defs>
  
  <!-- 粉色墙壁 -->
  <rect x="0" y="0" width="320" height="160" fill="#FFE4E8"/>
  
  <!-- 墙上小心心图案 -->
  <g opacity="0.3">
    <text x="30" y="80" font-size="16" fill="#FFB6C1">♥</text>
    <text x="80" y="50" font-size="12" fill="#FFB6C1">♥</text>
    <text x="250" y="70" font-size="14" fill="#FFB6C1">♥</text>
    <text x="280" y="40" font-size="10" fill="#FFB6C1">♥</text>
  </g>
  
  <!-- 地板 -->
  <rect x="0" y="160" width="320" height="80" fill="url(#pinkFloor)"/>
  
  <!-- 大窗户 - 白天 -->
  <rect x="100" y="20" width="120" height="100" fill="#87CEEB"/>
  <rect x="100" y="20" width="120" height="100" fill="none" stroke="#FFFFFF" stroke-width="8"/>
  <rect x="156" y="20" width="8" height="100" fill="#FFFFFF"/>
  <rect x="100" y="66" width="120" height="8" fill="#FFFFFF"/>
  <!-- 云朵 -->
  <ellipse cx="130" cy="45" rx="15" ry="8" fill="#FFFFFF"/>
  <ellipse cx="145" cy="42" rx="10" ry="6" fill="#FFFFFF"/>
  <ellipse cx="190" cy="55" rx="12" ry="6" fill="#FFFFFF"/>
  <!-- 粉色窗帘 -->
  <rect x="88" y="12" width="20" height="108" fill="#FFB6C1"/>
  <rect x="212" y="12" width="20" height="108" fill="#FFB6C1"/>
  <rect x="88" y="12" width="20" height="8" fill="#FF9AAA"/>
  <rect x="212" y="12" width="20" height="8" fill="#FF9AAA"/>
  
  <!-- 可爱小床 -->
  <rect x="20" y="125" width="90" height="55" fill="#FFFFFF"/>
  <rect x="20" y="125" width="90" height="55" fill="none" stroke="#FFB6C1" stroke-width="4"/>
  <!-- 床头 -->
  <rect x="20" y="125" width="90" height="12" fill="#FFB6C1"/>
  <!-- 兔子头枕头 -->
  <ellipse cx="50" cy="150" rx="16" ry="12" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="2"/>
  <ellipse cx="42" cy="140" rx="4" ry="8" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="1"/>
  <ellipse cx="58" cy="140" rx="4" ry="8" fill="#FFFFFF" stroke="#FFB6C1" stroke-width="1"/>
  <circle cx="46" cy="148" r="2" fill="#3A3A3A"/>
  <circle cx="54" cy="148" r="2" fill="#3A3A3A"/>
  <ellipse cx="50" cy="153" rx="2" ry="1" fill="#FFB6C1"/>
  <!-- 粉色被子 -->
  <rect x="28" y="162" width="74" height="14" fill="#FFE4E8"/>
  <rect x="28" y="162" width="74" height="4" fill="#FFB6C1"/>
  
  <!-- 心形地毯 -->
  <ellipse cx="200" cy="205" rx="55" ry="28" fill="#FF9AAA"/>
  <ellipse cx="200" cy="200" rx="45" ry="22" fill="#FFB6C1"/>
  <ellipse cx="200" cy="196" rx="35" ry="16" fill="#FFCCD5"/>
  
  <!-- 小桌子 -->
  <rect x="250" y="95" width="60" height="65" fill="#FFFFFF"/>
  <rect x="250" y="95" width="60" height="65" fill="none" stroke="#FFB6C1" stroke-width="3"/>
  <rect x="250" y="95" width="60" height="8" fill="#FFB6C1"/>
  <!-- 桌上小镜子 -->
  <ellipse cx="280" cy="85" rx="15" ry="18" fill="#E8F4FF"/>
  <ellipse cx="280" cy="85" rx="15" ry="18" fill="none" stroke="#FFB6C1" stroke-width="3"/>
  <!-- 化妆品 -->
  <rect x="260" y="90" width="8" height="12" fill="#FF6B8A"/>
  <rect x="295" y="88" width="10" height="14" fill="#9B59B6"/>
  
  <!-- 玩具熊 -->
  <ellipse cx="280" cy="210" rx="12" ry="10" fill="#DEB887"/>
  <circle cx="276" cy="206" r="3" fill="#DEB887"/>
  <circle cx="284" cy="206" r="3" fill="#DEB887"/>
  <circle cx="278" cy="208" r="1.5" fill="#3A3A3A"/>
  <circle cx="282" cy="208" r="1.5" fill="#3A3A3A"/>
  <ellipse cx="280" cy="212" rx="2" ry="1" fill="#8B4513"/>
  
  <!-- 猫形食物碗 -->
  <ellipse cx="60" cy="210" rx="22" ry="12" fill="#FFB6C1"/>
  <ellipse cx="60" cy="206" rx="18" ry="8" fill="#FFCCD5"/>
  <ellipse cx="60" cy="204" rx="14" ry="5" fill="#FFD5CD"/>
  <!-- 猫耳朵 -->
  <polygon points="42,200 48,192 54,200" fill="#FFB6C1"/>
  <polygon points="66,200 72,192 78,200" fill="#FFB6C1"/>
  
  <!-- 墙上相框 -->
  <rect x="30" y="35" width="40" height="50" fill="#FFFFFF"/>
  <rect x="30" y="35" width="40" height="50" fill="none" stroke="#FFB6C1" stroke-width="4"/>
  <!-- 相框内容 - 小脚印 -->
  <circle cx="45" cy="55" r="4" fill="#FFB6C1"/>
  <circle cx="42" cy="48" r="2" fill="#FFB6C1"/>
  <circle cx="48" cy="48" r="2" fill="#FFB6C1"/>
  <circle cx="55" cy="60" r="4" fill="#FFB6C1"/>
  <circle cx="52" cy="53" r="2" fill="#FFB6C1"/>
  <circle cx="58" cy="53" r="2" fill="#FFB6C1"/>
</svg>