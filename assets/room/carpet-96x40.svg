<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 40" width="384" height="160" style="image-rendering: pixelated;">
  <!-- 地毯 - 椭圆形紫色系花纹 96x40px -->
  
  <!-- 地毯阴影 -->
  <rect x="4" y="36" width="88" height="4" fill="#2A1A2A"/>
  
  <!-- 地毯外圈（深紫） -->
  <rect x="8" y="4" width="80" height="32" fill="#4A2A5A"/>
  <rect x="4" y="8" width="88" height="24" fill="#4A2A5A"/>
  <rect x="12" y="2" width="72" height="36" fill="#4A2A5A"/>
  <rect x="2" y="12" width="92" height="16" fill="#4A2A5A"/>
  
  <!-- 地毯中圈（中紫） -->
  <rect x="16" y="8" width="64" height="24" fill="#6A3A7A"/>
  <rect x="12" y="12" width="72" height="16" fill="#6A3A7A"/>
  <rect x="20" y="6" width="56" height="28" fill="#6A3A7A"/>
  
  <!-- 地毯内圈（浅紫） -->
  <rect x="24" y="12" width="48" height="16" fill="#8A5A9A"/>
  <rect x="20" y="14" width="56" height="12" fill="#8A5A9A"/>
  <rect x="28" y="10" width="40" height="20" fill="#8A5A9A"/>
  
  <!-- 中心图案 -->
  <rect x="40" y="16" width="16" height="8" fill="#AA7ABA"/>
  <rect x="44" y="14" width="8" height="12" fill="#AA7ABA"/>
  <rect x="46" y="18" width="4" height="4" fill="#CA9ADA"/>
  
  <!-- 花纹装饰 -->
  <!-- 左侧 -->
  <rect x="14" y="18" width="4" height="4" fill="#CA9ADA"/>
  <rect x="22" y="14" width="2" height="2" fill="#FFFFFF"/>
  <rect x="22" y="24" width="2" height="2" fill="#FFFFFF"/>
  
  <!-- 右侧 -->
  <rect x="78" y="18" width="4" height="4" fill="#CA9ADA"/>
  <rect x="72" y="14" width="2" height="2" fill="#FFFFFF"/>
  <rect x="72" y="24" width="2" height="2" fill="#FFFFFF"/>
  
  <!-- 上下装饰 -->
  <rect x="46" y="8" width="4" height="2" fill="#CA9ADA"/>
  <rect x="46" y="30" width="4" height="2" fill="#CA9ADA"/>
  
  <!-- 边缘流苏效果 -->
  <rect x="6" y="18" width="2" height="4" fill="#5A3A6A"/>
  <rect x="88" y="18" width="2" height="4" fill="#5A3A6A"/>
</svg>
