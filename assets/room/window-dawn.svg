<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" width="256" height="192" style="image-rendering: pixelated;">
  <!-- 窗户 - 晨光 6-9点 64x48px -->
  
  <!-- 外框（深棕木质） -->
  <rect x="0" y="0" width="64" height="48" fill="#4A3728"/>
  <rect x="2" y="2" width="60" height="44" fill="#5C4332"/>
  
  <!-- 窗户玻璃区域（橙粉晨光天空） -->
  <rect x="4" y="4" width="26" height="18" fill="#FFB08A"/>
  <rect x="34" y="4" width="26" height="18" fill="#FFB08A"/>
  <rect x="4" y="26" width="26" height="18" fill="#FFC8A8"/>
  <rect x="34" y="26" width="26" height="18" fill="#FFC8A8"/>
  
  <!-- 渐变天空效果 -->
  <rect x="4" y="4" width="56" height="4" fill="#FF9070"/>
  <rect x="4" y="8" width="56" height="4" fill="#FFA080"/>
  <rect x="4" y="36" width="56" height="8" fill="#FFD8C0"/>
  
  <!-- 日出太阳（下部） -->
  <rect x="42" y="34" width="10" height="6" fill="#FFE060"/>
  <rect x="44" y="32" width="6" height="2" fill="#FFE060"/>
  <rect x="40" y="36" width="14" height="4" fill="#FFCC40"/>
  
  <!-- 光线效果 -->
  <rect x="38" y="28" width="2" height="6" fill="#FFE8A0"/>
  <rect x="54" y="28" width="2" height="6" fill="#FFE8A0"/>
  <rect x="46" y="26" width="2" height="4" fill="#FFF0C0"/>
  
  <!-- 晨光云彩 -->
  <rect x="6" y="10" width="8" height="3" fill="#FFD8C8"/>
  <rect x="8" y="8" width="4" height="2" fill="#FFE8D8"/>
  <rect x="16" y="14" width="6" height="2" fill="#FFD8C8"/>
  <rect x="40" y="12" width="6" height="2" fill="#FFE0D0"/>
  
  <!-- 中间窗框（木质） -->
  <rect x="30" y="4" width="4" height="40" fill="#5C4332"/>
  <rect x="4" y="22" width="56" height="4" fill="#5C4332"/>
  
  <!-- 窗框高光 -->
  <rect x="4" y="4" width="26" height="1" fill="#7A6352"/>
  <rect x="34" y="4" width="26" height="1" fill="#7A6352"/>
  <rect x="4" y="26" width="26" height="1" fill="#7A6352"/>
  <rect x="34" y="26" width="26" height="1" fill="#7A6352"/>
  
  <!-- 窗台 -->
  <rect x="0" y="46" width="64" height="2" fill="#3A2718"/>
</svg>
