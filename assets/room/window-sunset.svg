<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" width="256" height="192" style="image-rendering: pixelated;">
  <!-- 窗户 - 夕阳 16-19点 64x48px -->
  
  <!-- 外框（深棕木质） -->
  <rect x="0" y="0" width="64" height="48" fill="#4A3728"/>
  <rect x="2" y="2" width="60" height="44" fill="#5C4332"/>
  
  <!-- 窗户玻璃区域（橙红夕阳天空） -->
  <rect x="4" y="4" width="26" height="18" fill="#FF6040"/>
  <rect x="34" y="4" width="26" height="18" fill="#FF6040"/>
  <rect x="4" y="26" width="26" height="18" fill="#FF8060"/>
  <rect x="34" y="26" width="26" height="18" fill="#FF8060"/>
  
  <!-- 天空渐变 -->
  <rect x="4" y="4" width="56" height="4" fill="#E04030"/>
  <rect x="4" y="8" width="56" height="4" fill="#FF5040"/>
  <rect x="4" y="34" width="56" height="10" fill="#FFA080"/>
  
  <!-- 夕阳（左下） -->
  <rect x="8" y="32" width="12" height="8" fill="#FF4020"/>
  <rect x="10" y="30" width="8" height="2" fill="#FF6040"/>
  <rect x="6" y="34" width="16" height="6" fill="#FF3010"/>
  <rect x="12" y="34" width="4" height="4" fill="#FF8060"/>
  
  <!-- 光线效果 -->
  <rect x="4" y="28" width="2" height="6" fill="#FFA080"/>
  <rect x="22" y="30" width="2" height="6" fill="#FFA080"/>
  <rect x="14" y="26" width="2" height="4" fill="#FFB090"/>
  
  <!-- 晚霞云彩 -->
  <rect x="38" y="8" width="10" height="3" fill="#FF8070"/>
  <rect x="36" y="9" width="14" height="2" fill="#FFA090"/>
  
  <rect x="46" y="14" width="8" height="2" fill="#FF9080"/>
  
  <rect x="40" y="30" width="8" height="2" fill="#FFB0A0"/>
  <rect x="52" y="32" width="6" height="2" fill="#FFA090"/>
  
  <!-- 中间窗框（木质） -->
  <rect x="30" y="4" width="4" height="40" fill="#5C4332"/>
  <rect x="4" y="22" width="56" height="4" fill="#5C4332"/>
  
  <!-- 窗框高光 -->
  <rect x="4" y="4" width="26" height="1" fill="#7A6352"/>
  <rect x="34" y="4" width="26" height="1" fill="#7A6352"/>
  <rect x="4" y="26" width="26" height="1" fill="#7A6352"/>
  <rect x="34" y="26" width="26" height="1" fill="#7A6352"/>
  
  <!-- 窗台 -->
  <rect x="0" y="46" width="64" height="2" fill="#3A2718"/>
</svg>
