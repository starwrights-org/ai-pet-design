<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="640" height="480" style="image-rendering: pixelated;">
  <!-- 像素风格房间场景 - 夜晚版 -->
  
  <defs>
    <pattern id="woodFloorNight" x="0" y="0" width="32" height="16" patternUnits="userSpaceOnUse">
      <rect width="32" height="16" fill="#5A4A14"/>
      <rect x="0" y="0" width="16" height="8" fill="#6A5A24"/>
      <rect x="16" y="8" width="16" height="8" fill="#6A5A24"/>
      <rect x="0" y="0" width="32" height="1" fill="#4A3A04"/>
      <rect x="0" y="8" width="32" height="1" fill="#4A3A04"/>
    </pattern>
  </defs>
  
  <!-- 深色墙壁 -->
  <rect x="0" y="0" width="320" height="160" fill="#2A2A4A"/>
  
  <!-- 地板 -->
  <rect x="0" y="160" width="320" height="80" fill="url(#woodFloorNight)"/>
  
  <!-- 窗户 - 夜晚 -->
  <rect x="120" y="20" width="80" height="100" fill="#1A1A3A"/>
  <rect x="120" y="20" width="80" height="100" fill="none" stroke="#5A4A14" stroke-width="8"/>
  <rect x="156" y="20" width="8" height="100" fill="#5A4A14"/>
  <rect x="120" y="66" width="80" height="8" fill="#5A4A14"/>
  <!-- 星星 -->
  <circle cx="140" cy="40" r="2" fill="#FFFACD"/>
  <circle cx="170" cy="50" r="1.5" fill="#FFFACD"/>
  <circle cx="185" cy="35" r="2" fill="#FFFACD"/>
  <circle cx="135" cy="60" r="1" fill="#FFFACD"/>
  <!-- 月亮 -->
  <circle cx="175" cy="45" r="12" fill="#FFFACD"/>
  <circle cx="180" cy="42" r="10" fill="#1A1A3A"/>
  <!-- 窗帘 -->
  <rect x="108" y="12" width="20" height="108" fill="#8B4A6B"/>
  <rect x="192" y="12" width="20" height="108" fill="#8B4A6B"/>
  
  <!-- 小床 -->
  <rect x="20" y="130" width="80" height="50" fill="#8B6847"/>
  <rect x="24" y="134" width="72" height="42" fill="#DDD8CF"/>
  <rect x="28" y="138" width="24" height="16" fill="#EEE0E5"/>
  <rect x="28" y="154" width="64" height="18" fill="#D8D0D8"/>
  
  <!-- 地毯 -->
  <ellipse cx="200" cy="200" rx="60" ry="30" fill="#5A8A7A"/>
  <ellipse cx="200" cy="200" rx="50" ry="24" fill="#4A7A6A"/>
  
  <!-- 台灯亮着 -->
  <rect x="240" y="60" width="8" height="40" fill="#3A3A3A"/>
  <ellipse cx="244" cy="55" rx="12" ry="8" fill="#FFF8DC"/>
  <!-- 灯光效果 -->
  <ellipse cx="244" cy="120" rx="40" ry="60" fill="#FFF8DC" opacity="0.15"/>
  
  <!-- 小夜灯（新增） -->
  <rect x="14" y="120" width="8" height="4" fill="#3A3A3A"/>
  <circle cx="18" cy="116" r="6" fill="#FFB6C1" opacity="0.8"/>
  <ellipse cx="18" cy="150" rx="20" ry="30" fill="#FFB6C1" opacity="0.1"/>
  
  <!-- 玩具 -->
  <circle cx="280" cy="210" r="8" fill="#8B4A5A"/>
  <circle cx="280" cy="210" r="4" fill="#AB6A7A"/>
  
  <!-- 食物碗 -->
  <ellipse cx="60" cy="210" rx="20" ry="10" fill="#2A4A7A"/>
  <ellipse cx="60" cy="206" rx="16" ry="7" fill="#3A5A8A"/>
  
  <!-- 门 -->
  <rect x="290" y="60" width="30" height="100" fill="#5A4A14"/>
  <circle cx="298" cy="110" r="4" fill="#8A7A2A"/>
</svg>