<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Cafe Wall Art - 墙上挂画 32x32px -->
  
  <!-- 画框 -->
  <rect x="0" y="0" width="32" height="32" fill="#8B4513"/>
  <rect x="2" y="2" width="28" height="28" fill="#654321"/>
  <rect x="4" y="4" width="24" height="24" fill="#F5F5DC"/>
  
  <!-- 咖啡杯画作 -->
  <rect x="10" y="10" width="12" height="10" fill="#FFFFFF"/>
  <rect x="12" y="12" width="8" height="6" fill="#8B4513"/>
  <!-- 杯把 -->
  <rect x="22" y="12" width="3" height="6" fill="#FFFFFF"/>
  <rect x="24" y="14" width="2" height="2" fill="#F5F5DC"/>
  <!-- 蒸汽 -->
  <rect x="14" y="6" width="2" height="4" fill="#D3D3D3"/>
  <rect x="18" y="8" width="2" height="3" fill="#D3D3D3"/>
  
  <!-- 装饰爱心 -->
  <rect x="8" y="22" width="4" height="4" fill="#FF69B4"/>
  <rect x="20" y="22" width="4" height="4" fill="#FF69B4"/>
</svg>
