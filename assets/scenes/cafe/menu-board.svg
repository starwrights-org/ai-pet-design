<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 48" width="160" height="96" style="image-rendering: pixelated;">
  <!-- Cafe Menu Board - 菜单板 80x48px -->
  
  <!-- 黑板框架 -->
  <rect x="0" y="0" width="80" height="48" fill="#8B4513"/>
  <rect x="4" y="4" width="72" height="40" fill="#2F4F4F"/>
  
  <!-- 黑板内容 -->
  <rect x="8" y="8" width="64" height="32" fill="#3A5A5A"/>
  
  <!-- 菜单文字（用方块表示） -->
  <!-- MENU标题 -->
  <rect x="28" y="10" width="24" height="4" fill="#FFFFFF"/>
  
  <!-- 咖啡图标 -->
  <rect x="12" y="18" width="4" height="4" fill="#D2691E"/>
  <rect x="20" y="18" width="16" height="2" fill="#F5F5DC"/>
  <rect x="20" y="22" width="12" height="2" fill="#FFD700"/>
  
  <!-- 蛋糕图标 -->
  <rect x="12" y="28" width="4" height="4" fill="#FF69B4"/>
  <rect x="20" y="28" width="16" height="2" fill="#F5F5DC"/>
  <rect x="20" y="32" width="12" height="2" fill="#FFD700"/>
  
  <!-- 价格列 -->
  <rect x="52" y="18" width="12" height="4" fill="#FFD700"/>
  <rect x="52" y="28" width="12" height="4" fill="#FFD700"/>
  
  <!-- 粉笔装饰 -->
  <rect x="64" y="36" width="6" height="2" fill="#FFFFFF"/>
</svg>
