<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" width="128" height="96" style="image-rendering: pixelated;">
  <!-- Cafe Table with Chairs - 桌椅组合 64x48px -->
  
  <!-- 桌子阴影 -->
  <rect x="14" y="42" width="36" height="6" fill="#4A3020"/>
  
  <!-- 桌腿 -->
  <rect x="28" y="24" width="8" height="20" fill="#654321"/>
  <rect x="26" y="40" width="12" height="4" fill="#5C4033"/>
  
  <!-- 桌面 -->
  <rect x="8" y="16" width="48" height="12" fill="#8B4513"/>
  <rect x="12" y="18" width="40" height="8" fill="#A0522D"/>
  <rect x="10" y="16" width="44" height="4" fill="#CD853F"/>
  
  <!-- 桌上物品 - 咖啡杯 -->
  <rect x="20" y="12" width="6" height="6" fill="#FFFFFF"/>
  <rect x="22" y="14" width="2" height="2" fill="#8B4513"/>
  
  <!-- 桌上物品 - 盘子 -->
  <rect x="38" y="14" width="8" height="4" fill="#F5F5DC"/>
  
  <!-- 左椅子 -->
  <rect x="0" y="24" width="12" height="16" fill="#CD853F"/>
  <rect x="2" y="8" width="8" height="20" fill="#DEB887"/>
  <rect x="0" y="6" width="12" height="4" fill="#CD853F"/>
  <rect x="2" y="40" width="3" height="6" fill="#8B4513"/>
  <rect x="7" y="40" width="3" height="6" fill="#8B4513"/>
  
  <!-- 右椅子 -->
  <rect x="52" y="24" width="12" height="16" fill="#CD853F"/>
  <rect x="54" y="8" width="8" height="20" fill="#DEB887"/>
  <rect x="52" y="6" width="12" height="4" fill="#CD853F"/>
  <rect x="54" y="40" width="3" height="6" fill="#8B4513"/>
  <rect x="59" y="40" width="3" height="6" fill="#8B4513"/>
</svg>
