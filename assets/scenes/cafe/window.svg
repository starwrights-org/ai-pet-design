<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="128" height="160" style="image-rendering: pixelated;">
  <!-- Cafe Window - 窗户 64x80px -->
  
  <!-- 窗框外层 -->
  <rect x="0" y="0" width="64" height="80" fill="#8B4513"/>
  <rect x="4" y="4" width="56" height="72" fill="#654321"/>
  
  <!-- 窗玻璃 -->
  <rect x="8" y="8" width="48" height="64" fill="#87CEEB"/>
  <rect x="10" y="10" width="44" height="28" fill="#ADD8E6"/>
  <rect x="10" y="42" width="44" height="28" fill="#5F9EA0"/>
  
  <!-- 窗框分隔 -->
  <rect x="30" y="8" width="4" height="64" fill="#8B4513"/>
  <rect x="8" y="38" width="48" height="4" fill="#8B4513"/>
  
  <!-- 窗外景色（简化） -->
  <!-- 天空 -->
  <rect x="10" y="10" width="18" height="26" fill="#87CEEB"/>
  <rect x="36" y="10" width="18" height="26" fill="#87CEEB"/>
  <!-- 云朵 -->
  <rect x="14" y="14" width="8" height="4" fill="#FFFFFF"/>
  <rect x="40" y="18" width="10" height="4" fill="#FFFFFF"/>
  <!-- 树 -->
  <rect x="10" y="44" width="8" height="12" fill="#228B22"/>
  <rect x="46" y="46" width="8" height="10" fill="#228B22"/>
  
  <!-- 窗帘 -->
  <rect x="4" y="4" width="8" height="72" fill="#DEB887"/>
  <rect x="52" y="4" width="8" height="72" fill="#DEB887"/>
  <rect x="6" y="6" width="4" height="68" fill="#D2B48C"/>
  <rect x="54" y="6" width="4" height="68" fill="#D2B48C"/>
</svg>
