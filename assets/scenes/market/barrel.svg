<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 36" width="56" height="72" style="image-rendering: pixelated;">
  <!-- Market Barrel - 木桶 28x36px -->
  
  <!-- 桶阴影 -->
  <rect x="4" y="32" width="20" height="4" fill="#4A3020"/>
  
  <!-- 桶主体 -->
  <rect x="4" y="4" width="20" height="32" fill="#8B4513"/>
  <rect x="2" y="8" width="24" height="24" fill="#A0522D"/>
  <rect x="0" y="12" width="28" height="16" fill="#CD853F"/>
  
  <!-- 金属环 -->
  <rect x="0" y="6" width="28" height="4" fill="#4A4A4A"/>
  <rect x="0" y="30" width="28" height="4" fill="#4A4A4A"/>
  <rect x="2" y="18" width="24" height="2" fill="#6A6A6A"/>
  
  <!-- 木板纹理 -->
  <rect x="8" y="8" width="2" height="24" fill="#654321"/>
  <rect x="14" y="8" width="2" height="24" fill="#654321"/>
  <rect x="20" y="8" width="2" height="24" fill="#654321"/>
  
  <!-- 桶盖 -->
  <rect x="4" y="0" width="20" height="6" fill="#8B4513"/>
  <rect x="6" y="2" width="16" height="2" fill="#A0522D"/>
</svg>
