<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" width="192" height="160" style="image-rendering: pixelated;">
  <!-- Market Food Stall - 食物摊 96x80px -->
  
  <!-- 摊位阴影 -->
  <rect x="8" y="72" width="80" height="8" fill="#4A3020"/>
  
  <!-- 摊位柜台 -->
  <rect x="4" y="48" width="88" height="28" fill="#DEB887"/>
  <rect x="8" y="52" width="80" height="20" fill="#F5DEB3"/>
  
  <!-- 柜台顶板 -->
  <rect x="0" y="44" width="96" height="8" fill="#CD853F"/>
  
  <!-- 食物展示 -->
  <!-- 面包篮 -->
  <rect x="8" y="32" width="24" height="16" fill="#CD853F"/>
  <rect x="10" y="28" width="10" height="8" fill="#D2691E"/>
  <rect x="20" y="30" width="8" height="6" fill="#DEB887"/>
  <rect x="12" y="36" width="8" height="4" fill="#D2691E"/>
  
  <!-- 蛋糕展示盘 -->
  <rect x="38" y="34" width="20" height="4" fill="#FFFFFF"/>
  <rect x="40" y="26" width="8" height="10" fill="#FF69B4"/>
  <rect x="42" y="24" width="4" height="4" fill="#FF1493"/>
  <rect x="50" y="28" width="6" height="8" fill="#FFFACD"/>
  <rect x="52" y="26" width="2" height="4" fill="#FF0000"/>
  
  <!-- 饼干罐 -->
  <rect x="66" y="30" width="14" height="18" fill="#4A4A4A"/>
  <rect x="68" y="32" width="10" height="14" fill="#6A6A6A"/>
  <rect x="66" y="28" width="14" height="4" fill="#2A2A2A"/>
  <!-- 饼干 -->
  <rect x="70" y="34" width="4" height="4" fill="#D2691E"/>
  <rect x="72" y="40" width="4" height="4" fill="#DEB887"/>
  
  <!-- 价格牌 -->
  <rect x="14" y="24" width="8" height="6" fill="#FFFFFF"/>
  <rect x="44" y="20" width="8" height="6" fill="#FFFFFF"/>
  <rect x="68" y="24" width="8" height="6" fill="#FFFFFF"/>
  
  <!-- 遮阳棚 -->
  <rect x="0" y="0" width="96" height="20" fill="#2ECC71"/>
  <rect x="0" y="0" width="24" height="20" fill="#FFFFFF"/>
  <rect x="48" y="0" width="24" height="20" fill="#FFFFFF"/>
</svg>
