<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="160" height="80" style="image-rendering: pixelated;">
  <!-- Market Sign - 集市招牌 80x40px -->
  
  <!-- 招牌主体 -->
  <rect x="0" y="8" width="80" height="32" fill="#8B4513"/>
  <rect x="4" y="12" width="72" height="24" fill="#DEB887"/>
  
  <!-- 装饰边框 -->
  <rect x="2" y="10" width="76" height="2" fill="#654321"/>
  <rect x="2" y="34" width="76" height="2" fill="#654321"/>
  
  <!-- MARKET文字（像素块） -->
  <rect x="12" y="18" width="8" height="12" fill="#8B4513"/>
  <rect x="24" y="18" width="8" height="12" fill="#8B4513"/>
  <rect x="36" y="18" width="8" height="12" fill="#8B4513"/>
  <rect x="48" y="18" width="8" height="12" fill="#8B4513"/>
  <rect x="60" y="18" width="8" height="12" fill="#8B4513"/>
  
  <!-- 悬挂链条 -->
  <rect x="8" y="0" width="4" height="10" fill="#4A4A4A"/>
  <rect x="68" y="0" width="4" height="10" fill="#4A4A4A"/>
</svg>
