  <!-- 灯座 -->
  <rect x="6" y="28" width="12" height="4" fill="#4A4A4A"/>
  <rect x="8" y="24" width="8" height="6" fill="#6A6A6A"/>
  
  <!-- 灯杆 -->
  <rect x="10" y="12" width="4" height="14" fill="#8B4513"/>
  
