<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 40" width="64" height="80" style="image-rendering: pixelated;">
  <!-- Library Reading Chair - 阅读椅 32x40px -->
  
  <!-- 椅子阴影 -->
  <rect x="4" y="36" width="24" height="4" fill="#2A1A10"/>
  
  <!-- 椅腿 -->
  <rect x="4" y="28" width="4" height="12" fill="#5C4033"/>
  <rect x="24" y="28" width="4" height="12" fill="#5C4033"/>
  
  <!-- 座垫 -->
  <rect x="2" y="20" width="28" height="12" fill="#8B0000"/>
  <rect x="4" y="22" width="24" height="8" fill="#A52A2A"/>
  
  <!-- 靠背 -->
  <rect x="4" y="0" width="24" height="24" fill="#5C4033"/>
  <rect x="6" y="2" width="20" height="20" fill="#8B0000"/>
  <rect x="8" y="4" width="16" height="16" fill="#A52A2A"/>
  
  <!-- 扶手 -->
  <rect x="0" y="12" width="4" height="16" fill="#5C4033"/>
  <rect x="28" y="12" width="4" height="16" fill="#5C4033"/>
  <rect x="0" y="10" width="6" height="4" fill="#4A3728"/>
  <rect x="26" y="10" width="6" height="4" fill="#4A3728"/>
</svg>
