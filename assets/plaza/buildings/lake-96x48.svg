<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 48" width="384" height="192" style="image-rendering: pixelated;">
  <!-- Lake - 月光湖 96x48px -->
  
  <!-- 水面 -->
  <rect x="8" y="20" width="80" height="28" fill="#4169E1"/>
  <rect x="4" y="24" width="88" height="20" fill="#1E90FF"/>
  <rect x="12" y="28" width="72" height="16" fill="#00BFFF"/>
  
  <!-- 水面波纹 -->
  <rect x="16" y="32" width="12" height="2" fill="#87CEEB"/>
  <rect x="36" y="36" width="16" height="2" fill="#87CEEB"/>
  <rect x="60" y="30" width="12" height="2" fill="#87CEEB"/>
  <rect x="24" y="40" width="8" height="2" fill="#87CEEB"/>
  <rect x="56" y="38" width="8" height="2" fill="#87CEEB"/>
  
  <!-- 月光倒影 -->
  <rect x="40" y="28" width="16" height="4" fill="#E0E0FF"/>
  <rect x="44" y="32" width="8" height="8" fill="#E0E0FF"/>
  <rect x="46" y="40" width="4" height="4" fill="#E0E0FF"/>
  
  <!-- 岸边 -->
  <rect x="0" y="16" width="96" height="8" fill="#90EE90"/>
  <rect x="0" y="20" width="8" height="4" fill="#228B22"/>
  <rect x="88" y="20" width="8" height="4" fill="#228B22"/>
  
  <!-- 木栈道 -->
  <rect x="36" y="8" width="24" height="16" fill="#8B4513"/>
  <rect x="38" y="10" width="20" height="12" fill="#DEB887"/>
  <rect x="38" y="10" width="20" height="2" fill="#CD853F"/>
  <rect x="38" y="14" width="20" height="2" fill="#CD853F"/>
  <rect x="38" y="18" width="20" height="2" fill="#CD853F"/>
  
  <!-- 栏杆 -->
  <rect x="34" y="6" width="2" height="12" fill="#654321"/>
  <rect x="60" y="6" width="2" height="12" fill="#654321"/>
  <rect x="34" y="4" width="28" height="2" fill="#8B4513"/>
  
  <!-- 小船 -->
  <rect x="68" y="34" width="12" height="6" fill="#8B4513"/>
  <rect x="70" y="32" width="8" height="2" fill="#A0522D"/>
  
  <!-- 荷叶 -->
  <rect x="16" y="26" width="6" height="4" fill="#228B22"/>
  <rect x="76" y="36" width="6" height="4" fill="#228B22"/>
  
  <!-- 招牌 -->
  <rect x="0" y="0" width="32" height="12" fill="#4169E1"/>
  <rect x="2" y="2" width="28" height="8" fill="#87CEEB"/>
  <!-- 月亮图标 -->
  <rect x="10" y="4" width="4" height="4" fill="#FFFACD"/>
  <rect x="18" y="4" width="4" height="4" fill="#FFFACD"/>
</svg>
