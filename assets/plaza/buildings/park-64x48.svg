  <rect x="57" y="32" width="2" height="4" fill="#FFD700"/>
  <rect x="59" y="30" width="2" height="6" fill="#FFA500"/>
  <rect x="61" y="33" width="2" height="3" fill="#FFD700"/>
  <rect x="56" y="34" width="8" height="2" fill="#228B22"/>
  
