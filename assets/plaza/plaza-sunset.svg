<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="960" height="640" style="image-rendering: pixelated;">
  <!-- 露天大广场 - 黄昏版 -->
  
  <defs>
    <linearGradient id="sunsetSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="30%" style="stop-color:#FF6347"/>
      <stop offset="60%" style="stop-color:#FF69B4"/>
      <stop offset="100%" style="stop-color:#9370DB"/>
    </linearGradient>
    
    <pattern id="grassSunset" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#5A9030"/>
      <rect x="2" y="4" width="2" height="4" fill="#4A8020"/>
      <rect x="8" y="8" width="2" height="4" fill="#4A8020"/>
    </pattern>
    
    <pattern id="stonePathSunset" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#A08060"/>
      <rect x="0" y="0" width="11" height="11" fill="#B09070" stroke="#907050" stroke-width="1"/>
      <rect x="12" y="12" width="11" height="11" fill="#B09070" stroke="#907050" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- 黄昏天空 -->
  <rect x="0" y="0" width="480" height="140" fill="url(#sunsetSky)"/>
  
  <!-- 落日 -->
  <circle cx="80" cy="120" r="35" fill="#FF4500" opacity="0.8"/>
  <circle cx="80" cy="120" r="28" fill="#FF6347" opacity="0.9"/>
  <circle cx="80" cy="120" r="20" fill="#FFA07A"/>
  
  <!-- 晚霞云 -->
  <g fill="#FFB6C1" opacity="0.7">
    <ellipse cx="150" cy="50" rx="40" ry="15"/>
    <ellipse cx="180" cy="45" rx="25" ry="12"/>
    <ellipse cx="300" cy="60" rx="50" ry="18"/>
    <ellipse cx="420" cy="45" rx="35" ry="14"/>
  </g>
  
  <!-- 远处丘陵 - 剪影 -->
  <path d="M 0 140 Q 80 110 160 140 Q 240 100 320 140 Q 400 115 480 140 L 480 160 L 0 160 Z" fill="#4A6030"/>
  
  <!-- 草地 -->
  <rect x="0" y="140" width="480" height="180" fill="url(#grassSunset)"/>
  
  <!-- 中央广场 -->
  <ellipse cx="240" cy="240" rx="140" ry="60" fill="url(#stonePathSunset)"/>
  
  <!-- 树木剪影 - 左 -->
  <rect x="30" y="150" width="20" height="60" fill="#3A2A1A"/>
  <ellipse cx="40" cy="120" rx="45" ry="40" fill="#1A4A1A"/>
  <ellipse cx="25" cy="130" rx="30" ry="25" fill="#2A5A2A"/>
  <ellipse cx="55" cy="125" rx="25" ry="22" fill="#1A4A1A"/>
  
  <!-- 树木剪影 - 右 -->
  <rect x="420" y="155" width="18" height="55" fill="#3A2A1A"/>
  <ellipse cx="430" cy="130" rx="40" ry="35" fill="#1A4A1A"/>
  <ellipse cx="415" cy="138" rx="28" ry="22" fill="#2A5A2A"/>
  
  <!-- 长椅 - 暗色 -->
  <rect x="100" y="185" width="50" height="20" fill="#5A3A2A"/>
  <rect x="330" y="185" width="50" height="20" fill="#5A3A2A"/>
  
  <!-- 喷泉 -->
  <ellipse cx="240" cy="250" rx="35" ry="18" fill="#4A6A8A"/>
  <ellipse cx="240" cy="248" rx="30" ry="14" fill="#5A7A9A"/>
  <rect x="225" y="250" width="30" height="20" fill="#707070"/>
  <rect x="220" y="268" width="40" height="8" fill="#606060"/>
  
  <!-- 路灯亮起 -->
  <rect x="90" y="155" width="6" height="50" fill="#2A2A2A"/>
  <ellipse cx="93" cy="150" rx="12" ry="8" fill="#FFD700"/>
  <ellipse cx="93" cy="175" rx="25" ry="35" fill="#FFD700" opacity="0.15"/>
  
  <rect x="385" y="155" width="6" height="50" fill="#2A2A2A"/>
  <ellipse cx="388" cy="150" rx="12" ry="8" fill="#FFD700"/>
  <ellipse cx="388" cy="175" rx="25" ry="35" fill="#FFD700" opacity="0.15"/>
  
  <!-- 飞鸟剪影 -->
  <g fill="#1A1A3A">
    <path d="M 200 80 Q 205 75 210 80 Q 205 78 200 80"/>
    <path d="M 220 70 Q 225 65 230 70 Q 225 68 220 70"/>
    <path d="M 250 85 Q 255 80 260 85 Q 255 83 250 85"/>
  </g>
</svg>