<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="960" height="640" style="image-rendering: pixelated;">
  <!-- 露天大广场 - 基础白天版 -->
  <!-- 480x320 更宽的场景，适合多宠物互动 -->
  
  <defs>
    <!-- 草地图案 -->
    <pattern id="grass" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#7EC850"/>
      <rect x="2" y="4" width="2" height="4" fill="#6AB840"/>
      <rect x="8" y="8" width="2" height="4" fill="#6AB840"/>
      <rect x="12" y="2" width="2" height="3" fill="#6AB840"/>
    </pattern>
    
    <!-- 石砖路图案 -->
    <pattern id="stonePath" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#C0A080"/>
      <rect x="0" y="0" width="11" height="11" fill="#D0B090" stroke="#A08060" stroke-width="1"/>
      <rect x="12" y="12" width="11" height="11" fill="#D0B090" stroke="#A08060" stroke-width="1"/>
      <rect x="12" y="0" width="11" height="11" fill="#C8A888" stroke="#A08060" stroke-width="1"/>
      <rect x="0" y="12" width="11" height="11" fill="#C8A888" stroke="#A08060" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- 天空 -->
  <rect x="0" y="0" width="480" height="140" fill="#87CEEB"/>
  
  <!-- 云朵 -->
  <g fill="#FFFFFF">
    <ellipse cx="60" cy="40" rx="30" ry="15"/>
    <ellipse cx="80" cy="35" rx="20" ry="12"/>
    <ellipse cx="45" cy="38" rx="18" ry="10"/>
    
    <ellipse cx="200" cy="55" rx="25" ry="12"/>
    <ellipse cx="220" cy="50" rx="18" ry="10"/>
    <ellipse cx="185" cy="52" rx="15" ry="8"/>
    
    <ellipse cx="380" cy="35" rx="35" ry="18"/>
    <ellipse cx="405" cy="30" rx="22" ry="12"/>
    <ellipse cx="360" cy="32" rx="20" ry="10"/>
    
    <ellipse cx="450" cy="60" rx="20" ry="10"/>
    <ellipse cx="465" cy="56" rx="15" ry="8"/>
  </g>
  
  <!-- 太阳 -->
  <circle cx="430" cy="45" r="25" fill="#FFD700"/>
  <circle cx="430" cy="45" r="20" fill="#FFF8DC"/>
  
  <!-- 远处的山/丘陵 -->
  <path d="M 0 140 Q 80 100 160 140 Q 240 90 320 140 Q 400 110 480 140 L 480 160 L 0 160 Z" fill="#98D898"/>
  
  <!-- 草地 -->
  <rect x="0" y="140" width="480" height="180" fill="url(#grass)"/>
  
  <!-- 中央广场石砖地 -->
  <ellipse cx="240" cy="240" rx="140" ry="60" fill="url(#stonePath)"/>
  <ellipse cx="240" cy="240" rx="140" ry="60" fill="none" stroke="#A08060" stroke-width="2"/>
  
  <!-- 左侧大树 -->
  <rect x="30" y="150" width="20" height="60" fill="#8B4513"/>
  <rect x="25" y="145" width="10" height="15" fill="#6B3503"/>
  <ellipse cx="40" cy="120" rx="45" ry="40" fill="#228B22"/>
  <ellipse cx="25" cy="130" rx="30" ry="25" fill="#2E8B2E"/>
  <ellipse cx="55" cy="125" rx="25" ry="22" fill="#32CD32"/>
  <ellipse cx="40" cy="105" rx="20" ry="18" fill="#3CB371"/>
  
  <!-- 右侧大树 -->
  <rect x="420" y="155" width="18" height="55" fill="#8B4513"/>
  <ellipse cx="430" cy="130" rx="40" ry="35" fill="#228B22"/>
  <ellipse cx="415" cy="138" rx="28" ry="22" fill="#2E8B2E"/>
  <ellipse cx="445" cy="135" rx="22" ry="20" fill="#32CD32"/>
  <ellipse cx="430" cy="115" rx="18" ry="15" fill="#3CB371"/>
  
  <!-- 长椅左 -->
  <rect x="100" y="195" width="50" height="8" fill="#8B4513"/>
  <rect x="100" y="185" width="50" height="12" fill="#A0522D"/>
  <rect x="102" y="187" width="46" height="3" fill="#CD853F"/>
  <rect x="102" y="191" width="46" height="3" fill="#CD853F"/>
  <rect x="105" y="203" width="8" height="15" fill="#6B4423"/>
  <rect x="137" y="203" width="8" height="15" fill="#6B4423"/>
  
  <!-- 长椅右 -->
  <rect x="330" y="195" width="50" height="8" fill="#8B4513"/>
  <rect x="330" y="185" width="50" height="12" fill="#A0522D"/>
  <rect x="332" y="187" width="46" height="3" fill="#CD853F"/>
  <rect x="332" y="191" width="46" height="3" fill="#CD853F"/>
  <rect x="335" y="203" width="8" height="15" fill="#6B4423"/>
  <rect x="367" y="203" width="8" height="15" fill="#6B4423"/>
  
  <!-- 喷泉（中央） -->
  <ellipse cx="240" cy="250" rx="35" ry="18" fill="#6495ED"/>
  <ellipse cx="240" cy="248" rx="30" ry="14" fill="#87CEEB"/>
  <ellipse cx="240" cy="246" rx="25" ry="10" fill="#ADD8E6"/>
  <!-- 喷泉底座 -->
  <rect x="225" y="250" width="30" height="20" fill="#A0A0A0"/>
  <rect x="220" y="268" width="40" height="8" fill="#808080"/>
  <!-- 喷水效果 -->
  <ellipse cx="240" cy="235" rx="3" ry="8" fill="#ADD8E6" opacity="0.8"/>
  <ellipse cx="235" cy="238" rx="2" ry="6" fill="#ADD8E6" opacity="0.6"/>
  <ellipse cx="245" cy="238" rx="2" ry="6" fill="#ADD8E6" opacity="0.6"/>
  
  <!-- 小花丛 - 左下 -->
  <g transform="translate(20, 280)">
    <circle cx="5" cy="5" r="4" fill="#FF69B4"/>
    <circle cx="12" cy="3" r="3" fill="#FFB6C1"/>
    <circle cx="18" cy="6" r="4" fill="#FF1493"/>
    <circle cx="8" cy="10" r="3" fill="#FF69B4"/>
    <rect x="3" y="8" width="2" height="8" fill="#228B22"/>
    <rect x="10" y="6" width="2" height="10" fill="#228B22"/>
    <rect x="16" y="9" width="2" height="8" fill="#228B22"/>
  </g>
  
  <!-- 小花丛 - 右下 -->
  <g transform="translate(440, 275)">
    <circle cx="5" cy="5" r="4" fill="#FFD700"/>
    <circle cx="12" cy="3" r="3" fill="#FFA500"/>
    <circle cx="18" cy="6" r="4" fill="#FF8C00"/>
    <circle cx="8" cy="10" r="3" fill="#FFD700"/>
    <rect x="3" y="8" width="2" height="8" fill="#228B22"/>
    <rect x="10" y="6" width="2" height="10" fill="#228B22"/>
    <rect x="16" y="9" width="2" height="8" fill="#228B22"/>
  </g>
  
  <!-- 路灯左 -->
  <rect x="90" y="155" width="6" height="50" fill="#3A3A3A"/>
  <ellipse cx="93" cy="150" rx="12" ry="8" fill="#FFF8DC"/>
  <ellipse cx="93" cy="150" rx="12" ry="8" fill="none" stroke="#8B8B00" stroke-width="2"/>
  
  <!-- 路灯右 -->
  <rect x="385" y="155" width="6" height="50" fill="#3A3A3A"/>
  <ellipse cx="388" cy="150" rx="12" ry="8" fill="#FFF8DC"/>
  <ellipse cx="388" cy="150" rx="12" ry="8" fill="none" stroke="#8B8B00" stroke-width="2"/>
  
  <!-- 蝴蝶装饰 -->
  <g transform="translate(150, 170)">
    <ellipse cx="0" cy="0" rx="4" ry="3" fill="#FF69B4" transform="rotate(-30)"/>
    <ellipse cx="6" cy="0" rx="4" ry="3" fill="#FF69B4" transform="rotate(30)"/>
    <ellipse cx="3" cy="0" rx="1" ry="3" fill="#8B4513"/>
  </g>
  
  <!-- 小鸟 -->
  <g transform="translate(300, 100)">
    <ellipse cx="0" cy="0" rx="6" ry="4" fill="#4169E1"/>
    <circle cx="-5" cy="-1" r="3" fill="#4169E1"/>
    <polygon points="-8,-1 -12,0 -8,1" fill="#FFA500"/>
    <circle cx="-6" cy="-2" r="1" fill="#000000"/>
  </g>
</svg>