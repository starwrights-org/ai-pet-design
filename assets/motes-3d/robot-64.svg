<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Robot Mote - 64x64 像素精灵 for 3D Billboard -->
  
  <!-- 天线 -->
  <rect x="30" y="2" width="4" height="8" fill="#6A6A6A"/>
  <rect x="28" y="2" width="8" height="4" fill="#FF4040"/>
  <rect x="29" y="3" width="6" height="2" fill="#FF6060"/>
  
  <!-- 头部 -->
  <rect x="14" y="10" width="36" height="26" fill="#8A8A8A"/>
  <rect x="12" y="14" width="4" height="18" fill="#6A6A6A"/>
  <rect x="48" y="14" width="4" height="18" fill="#6A6A6A"/>
  <rect x="16" y="12" width="32" height="22" fill="#A0A0A0"/>
  
  <!-- 眼睛（LED屏幕） -->
  <rect x="18" y="18" width="10" height="10" fill="#00FF00"/>
  <rect x="36" y="18" width="10" height="10" fill="#00FF00"/>
  <rect x="20" y="20" width="6" height="6" fill="#00AA00"/>
  <rect x="38" y="20" width="6" height="6" fill="#00AA00"/>
  <!-- 扫描线效果 -->
  <rect x="18" y="22" width="10" height="2" fill="#33FF33"/>
  <rect x="36" y="22" width="10" height="2" fill="#33FF33"/>
  
  <!-- 嘴巴（扬声器格栅） -->
  <rect x="24" y="30" width="16" height="4" fill="#4A4A4A"/>
  <rect x="26" y="31" width="2" height="2" fill="#2A2A2A"/>
  <rect x="30" y="31" width="2" height="2" fill="#2A2A2A"/>
  <rect x="34" y="31" width="2" height="2" fill="#2A2A2A"/>
  
  <!-- 身体 -->
  <rect x="16" y="36" width="32" height="22" fill="#8A8A8A"/>
  <rect x="18" y="38" width="28" height="18" fill="#A0A0A0"/>
  
  <!-- 胸部面板 -->
  <rect x="22" y="40" width="20" height="12" fill="#6A6A6A"/>
  <rect x="24" y="42" width="6" height="4" fill="#FF4040"/>
  <rect x="34" y="42" width="6" height="4" fill="#00BFFF"/>
  <rect x="28" y="48" width="8" height="2" fill="#FFFF00"/>
  
  <!-- 手臂 -->
  <rect x="6" y="38" width="10" height="16" fill="#6A6A6A"/>
  <rect x="48" y="38" width="10" height="16" fill="#6A6A6A"/>
  <rect x="8" y="40" width="6" height="12" fill="#8A8A8A"/>
  <rect x="50" y="40" width="6" height="12" fill="#8A8A8A"/>
  
  <!-- 脚 -->
  <rect x="18" y="58" width="10" height="6" fill="#6A6A6A"/>
  <rect x="36" y="58" width="10" height="6" fill="#6A6A6A"/>
</svg>
