<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Energy Mote - 64x64 像素精灵 for 3D Billboard -->
  
  <!-- 外层光晕 -->
  <rect x="18" y="6" width="28" height="4" fill="#87CEEB"/>
  <rect x="14" y="10" width="36" height="4" fill="#87CEEB"/>
  <rect x="10" y="14" width="44" height="36" fill="#87CEEB"/>
  <rect x="14" y="50" width="36" height="4" fill="#87CEEB"/>
  <rect x="18" y="54" width="28" height="4" fill="#87CEEB"/>
  
  <!-- 主体 -->
  <rect x="20" y="10" width="24" height="4" fill="#00BFFF"/>
  <rect x="16" y="14" width="32" height="4" fill="#00BFFF"/>
  <rect x="14" y="18" width="36" height="28" fill="#00BFFF"/>
  <rect x="16" y="46" width="32" height="4" fill="#00BFFF"/>
  <rect x="20" y="50" width="24" height="4" fill="#00BFFF"/>
  
  <!-- 核心 -->
  <rect x="22" y="16" width="20" height="4" fill="#E0FFFF"/>
  <rect x="18" y="20" width="28" height="24" fill="#E0FFFF"/>
  <rect x="22" y="44" width="20" height="4" fill="#E0FFFF"/>
  
  <!-- 眼睛 -->
  <rect x="22" y="26" width="6" height="8" fill="#FFFFFF"/>
  <rect x="36" y="26" width="6" height="8" fill="#FFFFFF"/>
  <!-- 瞳孔 -->
  <rect x="24" y="28" width="4" height="4" fill="#0000AA"/>
  <rect x="38" y="28" width="4" height="4" fill="#0000AA"/>
  <!-- 高光 -->
  <rect x="24" y="28" width="2" height="2" fill="#FFFFFF"/>
  <rect x="38" y="28" width="2" height="2" fill="#FFFFFF"/>
  
  <!-- 嘴巴（微笑） -->
  <rect x="28" y="38" width="8" height="2" fill="#0000AA"/>
  <rect x="26" y="36" width="2" height="2" fill="#0000AA"/>
  <rect x="36" y="36" width="2" height="2" fill="#0000AA"/>
  
  <!-- 能量火花 -->
  <rect x="6" y="28" width="4" height="2" fill="#FFFF00"/>
  <rect x="4" y="32" width="6" height="2" fill="#FFFF00"/>
  <rect x="54" y="28" width="4" height="2" fill="#FFFF00"/>
  <rect x="54" y="32" width="6" height="2" fill="#FFFF00"/>
  <rect x="28" y="2" width="2" height="4" fill="#FFFF00"/>
  <rect x="34" y="2" width="2" height="4" fill="#FFFF00"/>
</svg>
