<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Cat Mote - 64x64 像素精灵 for 3D Billboard -->
  
  <!-- 耳朵 -->
  <rect x="12" y="8" width="8" height="12" fill="#FFB366"/>
  <rect x="44" y="8" width="8" height="12" fill="#FFB366"/>
  <rect x="14" y="10" width="4" height="8" fill="#FFCC99"/>
  <rect x="46" y="10" width="4" height="8" fill="#FFCC99"/>
  <!-- 耳朵内部粉色 -->
  <rect x="15" y="12" width="2" height="4" fill="#FFB6C1"/>
  <rect x="47" y="12" width="2" height="4" fill="#FFB6C1"/>
  
  <!-- 头部 -->
  <rect x="16" y="16" width="32" height="28" fill="#FFB366"/>
  <rect x="12" y="20" width="4" height="20" fill="#FFB366"/>
  <rect x="48" y="20" width="4" height="20" fill="#FFB366"/>
  <rect x="18" y="18" width="28" height="24" fill="#FFCC99"/>
  
  <!-- 眼睛 - 大圆眼 -->
  <rect x="20" y="26" width="8" height="10" fill="#FFFFFF"/>
  <rect x="36" y="26" width="8" height="10" fill="#FFFFFF"/>
  <!-- 瞳孔 -->
  <rect x="24" y="28" width="4" height="6" fill="#2E4A2E"/>
  <rect x="38" y="28" width="4" height="6" fill="#2E4A2E"/>
  <!-- 高光 -->
  <rect x="22" y="28" width="2" height="2" fill="#FFFFFF"/>
  <rect x="38" y="28" width="2" height="2" fill="#FFFFFF"/>
  
  <!-- 鼻子 -->
  <rect x="30" y="36" width="4" height="3" fill="#FFB6C1"/>
  
  <!-- 嘴巴 -->
  <rect x="28" y="39" width="2" height="2" fill="#CC8855"/>
  <rect x="34" y="39" width="2" height="2" fill="#CC8855"/>
  <rect x="30" y="40" width="4" height="2" fill="#CC8855"/>
  
  <!-- 胡须 -->
  <rect x="8" y="34" width="10" height="1" fill="#4A4A4A"/>
  <rect x="10" y="37" width="8" height="1" fill="#4A4A4A"/>
  <rect x="46" y="34" width="10" height="1" fill="#4A4A4A"/>
  <rect x="46" y="37" width="8" height="1" fill="#4A4A4A"/>
  
  <!-- 身体 -->
  <rect x="18" y="44" width="28" height="16" fill="#FFB366"/>
  <rect x="20" y="46" width="24" height="12" fill="#FFCC99"/>
  
  <!-- 肚子白色 -->
  <rect x="26" y="48" width="12" height="8" fill="#FFFFFF"/>
  
  <!-- 前爪 -->
  <rect x="18" y="56" width="8" height="6" fill="#FFB366"/>
  <rect x="38" y="56" width="8" height="6" fill="#FFB366"/>
  <rect x="20" y="58" width="4" height="4" fill="#FFCC99"/>
  <rect x="40" y="58" width="4" height="4" fill="#FFCC99"/>
</svg>
