<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering: pixelated;">
  <!-- Slime Mote - 64x64 像素精灵 for 3D Billboard -->
  
  <!-- 身体轮廓 -->
  <rect x="18" y="8" width="28" height="4" fill="#32CD32"/>
  <rect x="12" y="12" width="40" height="4" fill="#32CD32"/>
  <rect x="8" y="16" width="48" height="36" fill="#32CD32"/>
  <rect x="10" y="52" width="44" height="4" fill="#32CD32"/>
  <rect x="14" y="56" width="36" height="4" fill="#32CD32"/>
  <rect x="20" y="60" width="24" height="2" fill="#32CD32"/>
  
  <!-- 身体主色 -->
  <rect x="20" y="12" width="24" height="4" fill="#7CFC00"/>
  <rect x="14" y="16" width="36" height="4" fill="#7CFC00"/>
  <rect x="12" y="20" width="40" height="32" fill="#7CFC00"/>
  <rect x="16" y="52" width="32" height="4" fill="#7CFC00"/>
  <rect x="22" y="56" width="20" height="4" fill="#7CFC00"/>
  
  <!-- 高光 -->
  <rect x="16" y="16" width="12" height="8" fill="#ADFF2F"/>
  <rect x="14" y="22" width="8" height="6" fill="#ADFF2F"/>
  
  <!-- 眼睛 -->
  <rect x="20" y="28" width="10" height="12" fill="#FFFFFF"/>
  <rect x="36" y="28" width="10" height="12" fill="#FFFFFF"/>
  <!-- 瞳孔 -->
  <rect x="24" y="32" width="6" height="6" fill="#2A2A2A"/>
  <rect x="38" y="32" width="6" height="6" fill="#2A2A2A"/>
  <!-- 高光 -->
  <rect x="22" y="30" width="2" height="2" fill="#FFFFFF"/>
  <rect x="38" y="30" width="2" height="2" fill="#FFFFFF"/>
  
  <!-- 嘴巴（可爱微笑） -->
  <rect x="28" y="44" width="8" height="4" fill="#228B22"/>
  <rect x="26" y="44" width="2" height="2" fill="#228B22"/>
  <rect x="36" y="44" width="2" height="2" fill="#228B22"/>
  
  <!-- 液滴效果 -->
  <rect x="4" y="48" width="4" height="6" fill="#32CD32"/>
  <rect x="5" y="54" width="2" height="4" fill="#32CD32"/>
  <rect x="56" y="46" width="4" height="8" fill="#32CD32"/>
  <rect x="57" y="54" width="2" height="4" fill="#32CD32"/>
</svg>
